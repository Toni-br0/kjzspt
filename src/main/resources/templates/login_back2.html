<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>用户登录</title>

    <link rel="stylesheet" th:href="@{/admin/css/other/login-style.css}"/>
    <link rel="stylesheet" th:href="@{/admin/css/other/login-reset.css}"/>
    <link rel="stylesheet" th:href="@{/admin/css/other/style.css}"/>

    <th:block th:include="include :: header('登录')"/>

</head>
<body>

<!--消息提示框-->
<div class="tips-title"></div>

<div style="background-image:url(/admin/images/bg.jpg)" id="particles-js">
    <div class="loginbox card">
        <div class="card-arrow">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="logo">客经智数平台</div>
        <div class="logintit"><span>用户登录</span></div>
        <form action="javascript:void(0);" style="width: 100%;height: 100%">
            <ul class="logininput">
                <li>
                    <i><img src="/admin/images/icon1.png"></i>
                    <input name="username" id="username" class="forminput" value="" type="text" placeholder="用户名">
                </li>
                <li>
                    <i><img src="/admin/images/icon2.png"></i>
                    <input name="password" id="password" class="forminput" type="password" value="" placeholder="密码">
                </li>
                <li>
                    <i><img src="/admin/images/icon3.png"></i>
                    <input name="captcha" id="captcha" class="forminput" value="" placeholder="验证码" style="width: calc(100% - 130px)">
                    <!--<img src="/admin/images/yzm.jpg" class="yzmimg">-->
                    <img class="yzmimg" id="captchaImage" name="captchaImage" src="/system/captcha/generate" style="border-radius: 5px;"/>
                </li>

                <li>
                    <div class=" flex1">
                        <label> <input type="checkbox" name="remember-me" id="remember-me" class="aui-checkbox">
                            <span class="remember-font">&nbsp;记住密码</span>
                        </label>
                        <!--<a href="忘记密码1.html" class="text-primary"> 忘记密码？</a>-->
                    </div>
                </li>
                <li>
                    <a class="btn btnblock btn-lg btn-block btn-primary" style="line-height: 52px;font-size: 22px;" lay-filter="login" lay-submit>登 录</a>

                </li>

            </ul>
        </form>
    </div>
    <div class="sk-rotating-plane"></div>
</div>


<th:block th:include="include :: footer"/>
<script src="/admin/js/particles.min.js"></script>
<script src="/admin/js/app.js"></script>

<script>
    layui.use(['form', 'jquery', 'layer', 'button', 'popup'], function () {
        let form = layui.form;
        let $ = layui.jquery;
        let layer = layui.layer;
        let button = layui.button;
        let popup = layui.popup;
        let captchaPath = "/system/captcha/generate";

        //用户名输入框事件
        $('#username').on('input', function() {
            var usernameValue = $(this).val();
            //从缓存中获取密码
            var passWordValue = localStorage.getItem(usernameValue);
            if(passWordValue != null && passWordValue.trim().length >0){
                $('#password').val(passWordValue);
                //设置记住密码复选框为选中状态
                $('#remember-me').attr("checked",true);
                form.render("checkbox");
            }else{
                $('#password').val("");
            }
        });



        // 登录
        form.on('submit(login)', function (data) {
            let loader = layer.load();
            let btn = button.load({elem: '.login'});

            //var username = $('#username').val();
            var username = $('#username').val();
            var password = $('#password').val();
            var captcha =$('#captcha').val();

            console.log(username);

            if(username.trim().length ==0){
                $('.tips-title').text("用户名不能为空").show().delay(2000).fadeOut();
                return false;
            }

            if(password.trim().length ==0){
                $('.tips-title').text("密码不能为空").show().delay(2000).fadeOut();

                return false;
            }

            if(captcha.trim().length ==0){
                $('.tips-title').text("验证码不能为空").show().delay(2000).fadeOut();

                return false;
            }

            var paramObj = {
                username: username,
                password: password,
                captcha: captcha
            };

            $.ajax({
                url: '/login',
                //data: data.field,
                data: paramObj,
                type: "post",
                dataType: 'json',
                success: function (result) {
                    layer.close(loader);
                    btn.stop(function () {
                        if (result.success) {
                            //记住密码
                            var checkedValue = $('#remember-me').prop('checked');
                            if(checkedValue){
                                localStorage.setItem(username, password);
                            }else{
                                localStorage.removeItem(username);
                            }

                            /*popup.success(result.msg, function () {
                                location.href = "/index";
                            })*/

                            $('.tips-title').text("登录成功").show().delay(1500).fadeOut();
                            location.href = "/index";

                        } else {
                            /*popup.failure(result.msg, function () {
                                document.getElementById("captchaImage").src = captchaPath + "?" + Math.random();
                            });*/
                            $('.tips-title').text(result.msg).show().delay(2500).fadeOut();
                            document.getElementById("captchaImage").src = captchaPath + "?" + Math.random();
                        }
                    })
                }
            });
            return false;
        });

        $("#captchaImage").click(function () {
            document.getElementById("captchaImage").src = captchaPath + "?" + Math.random();
        })

        setInterval(function () {
            document.getElementById("captchaImage").src = captchaPath + "?" + Math.random();
        }, 30 * 1000);

        validateKickout();
    })
</script>
<script>
    if (window != top) {
        top.location.href = location.href;
    }

    function validateKickout() {
        if (getParam("abnormalout") == 1) {
            layer.alert("<font color='red'>您已在别处登录，请您修改密码或重新登录</font>", {
                    icon: 0,
                    title: "系统提示"
                },
                function (index) {
                    layer.close(index);
                });
        } else if (getParam("sessionout") == 1) {
            layer.alert("<font color='red'>登录已过期，请重新登录</font>", {
                    icon: 0,
                    title: "系统提示"
                },
                function (index) {
                    layer.close(index);
                });
        }
    }

    function getParam(paramName) {
        var reg = new RegExp("(^|&)" + paramName + "=([^&]*)(&|$)");
        var r = window.location.search.substr(1).match(reg);
        if (r != null) return decodeURI(r[2]);
        return null;
    }
</script>

</body>
</html>
