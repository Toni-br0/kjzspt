<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('登录')"/>
    <link rel="stylesheet" th:href="@{/admin/css/other/login.css}"/>
</head>
<!-- 代 码 结 构 -->
<body class="login-body" background="admin/images/login.svg">

    <div class="content-div">
    <form action="javascript:void(0);" class="layui-form">

        <div class="layui-form-item">
            <!--<img class="logo" src="admin/images/logo.png"/>-->
            <!-- <div class="title">智慧解决方案生成平台</div>-->
            <div class="title_1">
                客经智数平台
            </div>
        </div>
        <div class="layui-form-item">
            <input class="layui-input" hover name="username" id="username" placeholder="用户名" type="text" />
        </div>
        <div class="layui-form-item">
            <input class="layui-input" hover name="password" id="password" placeholder="密码" type="password" />
        </div>
        <div class="layui-form-item">
            <input class="code layui-input layui-input-inline" hover name="captcha" placeholder="验证码" />
            <img class="codeImage" id="captchaImage" src="/system/captcha/generate" style="border-radius: 18px;"/>
        </div>
        <div class="layui-form-item">
            <input lay-skin="primary" name="remember-me" id="remember-me" title="记住密码" type="checkbox" >
        </div>
        <div class="layui-form-item">
            <button class="pear-btn pear-btn-primary login" lay-filter="login" lay-submit style="border-radius: 18px;">
                登 录
            </button>
        </div>
    </form>
    </div>
</div>

<th:block th:include="include :: footer"/>
<script>
    layui.use(['form', 'jquery', 'layer', 'button', 'popup'], function () {
        let form = layui.form;
        let $ = layui.jquery;
        let layer = layui.layer;
        let button = layui.button;
        let popup = layui.popup;
        let captchaPath = "/system/captcha/generate";

        //用户名输入框事件
        $('#username').on('input', function() {
            var usernameValue = $(this).val();
            //从缓存中获取密码
            var passWordValue = localStorage.getItem(usernameValue);
            if(passWordValue != null && passWordValue.trim().length >0){
                $('#password').val(passWordValue);
                //设置记住密码复选框为选中状态
                $('#remember-me').attr("checked",true);
                form.render("checkbox");
            }else{
                $('#password').val("");
            }
        });


        // 登录
        form.on('submit(login)', function (data) {
            let loader = layer.load();
            let btn = button.load({elem: '.login'});

            var username = $('#username').val();
            var password = $('#password').val();
            if(username.trim().length ==0){
                popup.failure("用户名不能为空", function () {

                });

                layer.close(loader);
                btn.stop(function () {

                })
                return false;
            }

            if(password.trim().length ==0){
                popup.failure("密码不能为空", function () {

                });

                layer.close(loader);
                btn.stop(function () {

                })
                return false;
            }


            $.ajax({
                url: '/login',
                data: data.field,
                type: "post",
                dataType: 'json',
                success: function (result) {
                    layer.close(loader);
                    btn.stop(function () {
                        if (result.success) {
                            //记住密码
                            var checkedValue = $('#remember-me').prop('checked');
                            if(checkedValue){
                                localStorage.setItem(username, password);
                            }else{
                                localStorage.removeItem(username);
                            }

                            popup.success(result.msg, function () {
                                location.href = "/index";
                            })
                        } else {
                            popup.failure(result.msg, function () {
                                document.getElementById("captchaImage").src = captchaPath + "?" + Math.random();
                            });
                        }
                    })
                }
            });
            return false;
        });

        $("#captchaImage").click(function () {
            document.getElementById("captchaImage").src = captchaPath + "?" + Math.random();
        })

        setInterval(function () {
            document.getElementById("captchaImage").src = captchaPath + "?" + Math.random();
        }, 30 * 1000);

        validateKickout();
    })
</script>
<script>
    if (window != top) {
        top.location.href = location.href;
    }

    function validateKickout() {
        if (getParam("abnormalout") == 1) {
            layer.alert("<font color='red'>您已在别处登录，请您修改密码或重新登录</font>", {
                    icon: 0,
                    title: "系统提示"
                },
                function (index) {
                    layer.close(index);
                });
        } else if (getParam("sessionout") == 1) {
            layer.alert("<font color='red'>登录已过期，请重新登录</font>", {
                    icon: 0,
                    title: "系统提示"
                },
                function (index) {
                    layer.close(index);
                });
        }
    }

    function getParam(paramName) {
        var reg = new RegExp("(^|&)" + paramName + "=([^&]*)(&|$)");
        var r = window.location.search.substr(1).match(reg);
        if (r != null) return decodeURI(r[2]);
        return null;
    }
</script>
</body>
</html>
