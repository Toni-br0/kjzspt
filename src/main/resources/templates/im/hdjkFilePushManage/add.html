                <div class="layui-form-item">

<th:block th:include="include :: footer"/>
<script>

    layui.use(['form', 'jquery', 'dtree'], function () {

        let form = layui.form;
        let $ = layui.jquery;
        let dtree = layui.dtree;
        var layer = layui.layer;

        //获取模板下拉树
        $.ajax({
            url: '/im/hdjkFilePushManage/getModelSelect',
            dataType: 'json',
            contentType: 'application/json',
            type: 'get',
            success: function (result) {

                var demo1 = xmSelect.render({
                    el: '#modelSel',
                    theme: {
                        color: '#287ED8',
                    },
                    toolbar: {
                        show: true,
                        showIcon: false,
                    },
                    filterable: true,
                    paging: true,
                    pageSize: 5,
                    layVerify: 'required',
                    radio: true,
                    on: function(data){
                        //arr:  当前多选已选中的数据
                        var arr = data.arr;

                        var dataLength = arr.length;
                        if(dataLength >0) {
                            var modelIds = "";
                            var modelName ="";
                            for (var i = 0; i < dataLength; i++) {
                                var selData = arr[i];
                                if(i !=0){
                                    modelIds +=","+selData.value;
                                    modelName +=","+selData.modelName;
                                }else{
                                    modelIds +=selData.value;
                                    modelName +=selData.modelName;
                                }
                            }

                            //console.log("modelIds: "+modelIds);
                            $("#modelId").val(modelIds);
                            $("#modelName").val(modelName);

                            $("#sendFileName").val(modelName);
                        }
                    },
                    data: result
                });
            }
        });

        //获取推送对象下拉框
        $.ajax({
            url: '/im/pushObjectManage/getPushObjectManageSelect',
            dataType: 'json',
            contentType: 'application/json',
            type: 'get',
            success: function (result) {

                var demo1 = xmSelect.render({
                    el: '#pushObjectSel',
                    theme: {
                        color: '#287ED8',
                    },
                    toolbar: {
                        show: true,
                        showIcon: false,
                    },
                    filterable: true,
                    paging: true,
                    pageSize: 5,
                    layVerify: 'required',
                    /*radio: true,*/
                    on: function(data){
                        //arr:  当前多选已选中的数据
                        var arr = data.arr;

                        var dataLength = arr.length;
                        if(dataLength >0) {
                            var pushObjectIds = "";

                            for (var i = 0; i < dataLength; i++) {
                                var selData = arr[i];

                                if(i!=0){
                                    pushObjectIds = pushObjectIds +";"+selData.id;
                                }else{
                                    pushObjectIds = pushObjectIds +selData.id;
                                }
                            }

                            //console.log("modelIds: "+modelIds);
                            $("#pushObjectId").val(pushObjectIds);
                            console.log("pushObjectIds: "+pushObjectIds);

                        }
                    },

                    data: result
                });
            }
        });


        var pushLeaderXmSelect;
        //获取推送领导下拉框
        $.ajax({
            url: '/im/pushObjectManage/getPushObjectManageSelect',
            dataType: 'json',
            contentType: 'application/json',
            type: 'get',
            success: function (result) {

                pushLeaderXmSelect = xmSelect.render({
                    el: '#pushLeaderSel',
                    theme: {
                        color: '#287ED8',
                    },
                    toolbar: {
                        show: true,
                        showIcon: false,
                    },
                    filterable: true,
                    paging: true,
                    pageSize: 5,
                    /*radio: true,*/
                    on: function(data){
                        //arr:  当前多选已选中的数据
                        var arr = data.arr;

                        var dataLength = arr.length;
                        if(dataLength >0) {
                            var pushLeaderIds = "";

                            for (var i = 0; i < dataLength; i++) {
                                var selData = arr[i];

                                if(i!=0){
                                    pushLeaderIds = pushLeaderIds +";"+selData.id;
                                }else{
                                    pushLeaderIds = pushLeaderIds +selData.id;
                                }
                            }

                            //console.log("modelIds: "+modelIds);
                            $("#pushLeaderId").val(pushLeaderIds);
                            console.log("pushLeaderIds: "+pushLeaderIds);

                        }
                    },

                    data: result
                });
            }
        });

        var selSendObjectMonth = $('#selSendObjectMonth');
        var daysInMonth = getDaysInMonth();

        // 添加天数选项
        for (var i = 1; i <= daysInMonth; i++) {
            // 创建option元素并添加到下拉框
            if(i <10){
                selSendObjectMonth.append($('<option>', {
                    value: '0'+i,
                    text: i + '日'
                }));

            }else{
                selSendObjectMonth.append($('<option>', {
                    value: i,
                    text: i + '日'
                }));
            }
        }

        form.render('select');

        //推送对象周期单选事件
        form.on('radio(pushObjectPeriodFilter)', function(data){
            if(data.value == "day"){
                $("#selSendObjectMonthDiv").hide();
                $("#selSendObjectWeekDiv").hide();
            }else if(data.value == "week"){
                $("#selSendObjectMonthDiv").hide();
                $("#selSendObjectWeekDiv").show();
            }else if(data.value == "month"){
                $("#selSendObjectMonthDiv").show();
                $("#selSendObjectWeekDiv").hide();
            }
        })


        //是否推送领导单选事件
        form.on('radio(isPushLeaderFilter)', function(data){
            if(data.value == "1"){
                $("#isPushLeaderDiv").show();
                pushLeaderXmSelect.options.layVerify = 'required';
                // 必须调用 update 方法使配置生效
                pushLeaderXmSelect.update();
            }else{
                $("#isPushLeaderDiv").hide();
                pushLeaderXmSelect.options.layVerify = '';
                pushLeaderXmSelect.update();
            }
        })


        //保存提交事件
        form.on('submit(user-save)', function (data) {

            //推送对象时分
            var selSendObjectHour = $("#selSendObjectHour").val();
            var selSendObjectMinute = $("#selSendObjectMinute").val();
            var sendObjectTime = selSendObjectHour+":"+selSendObjectMinute;
            data.field.sendObjectTime = sendObjectTime;

            //推送对象周期
            var pushObjectPeriodValue = $('input[name="pushObjectPeriod"]:checked').val();
            if(pushObjectPeriodValue == "week"){ //周
                var selSendObjectWeekValue = $("#selSendObjectWeek").val();
                data.field.sendObjectWeek = selSendObjectWeekValue;
                data.field.sendObjectDay = "";
            }else if(pushObjectPeriodValue == "month"){ //月
                var selSendObjectMonthValue = $("#selSendObjectMonth").val();
                data.field.sendObjectDay = selSendObjectMonthValue;
                data.field.sendObjectWeek = "";
            }

            data.field.execState = "0";


            var param = JSON.stringify(data.field);

            //data.field.modelId = data.field.select;
            console.log("param: "+param);

            $("#loadDiv").show();
            $("#btnSubmit").prop("disabled", true);
            $("#btnReset").prop("disabled", true);

            $.ajax({
                url: '/im/hdjkFilePushManage/save',
                data: param,
                dataType: 'json',
                contentType: 'application/json',
                type: 'post',
                success: function (result) {

                    $("#loadDiv").hide();
                    $("#btnSubmit").prop("disabled", false);
                    $("#btnReset").prop("disabled", false);

                    if (result.success) {
                        layer.msg(result.msg, {icon: 1, time: 2000}, function () {
                            parent.layer.close(parent.layer.getFrameIndex(window.name));//关闭当前页
                            parent.layui.table.reload("file-table");
                        });
                    } else {
                        layer.msg(result.msg, {icon: 2, time: 2000});
                    }
                }
            })
            return false;
        });

        // 获取当月天数
        function getDaysInMonth() {
            const date = new Date(); // 当前日期
            const year = date.getFullYear();
            const month = date.getMonth() + 1; // 月份从0开始，需+1

            // 下个月的第0天 = 当前月的最后一天
            return new Date(year, month, 0).getDate();
        }

    })



</script>
