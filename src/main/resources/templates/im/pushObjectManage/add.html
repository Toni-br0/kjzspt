<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('文件推送管理新增')"/>
</head>
<body>

<!--加载动画-->
<div class="loading" style="display: none" id="loadDiv">
    <span class="top"></span>
    <span class="bottom"></span>
</div>

<form class="layui-form">
    <div class="mainBox">
        <div class="main-container">
            <div class="main-container">

                <input id="objectAreaId" name="objectAreaId" type="hidden" th:value="${orgId}">
                <input id="objectArea" name="objectArea" type="hidden" th:value="${orgName}">

                <div class="layui-form-item">
                    <label class="layui-form-label" style="width: 120px;">分类类型：</label>
                    <div class="layui-input-block" style="margin-left:130px;">
                        <input name="classType" title="标签分组" type="radio" value="bqwd" checked >
                    </div>

                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="width: 120px;"><span style="color:red;">*</span>推送对象类型：</label>
                    <div class="layui-input-block" style="margin-left:130px;">
                        <input name="pushObjectType" title="用户" type="radio" value="users" checked lay-filter="pushObjectType">
                        <input name="pushObjectType" title="群" type="radio" value="group" lay-filter="pushObjectType">

                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="width: 120px;"><span style="color:red;">*</span>推送对象ID：</label>
                    <div class="layui-input-block" style="margin-left:150px;">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="pushObjectId" id="pushObjectId" placeholder=""
                               type="text">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="width: 120px;"><span style="color:red;">*</span>推送对象名称：</label>
                    <div class="layui-input-block" style="margin-left:150px;">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="pushObjectName" id="pushObjectName" placeholder=""
                               type="text">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="width: 120px;"><span style="color:red;">*</span>所属维度：</label>
                    <div class="layui-input-block" style="margin-left:150px;">
                        <ul class="dtree" data-id="0" id="wdName" name="wdName"></ul>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="width: 120px;">备注：</label>
                    <div class="layui-input-block" style="margin-left:150px;">
                        <textarea id="remark" name="remark" placeholder="" class="layui-textarea"></textarea>
                    </div>
                </div>

                <div class="layui-form-item" style="margin-top:50px; display: flex; justify-content: center; align-items: center;">

                    <!--<button id="btnSubmit" class="pear-btn pear-btn-primary pear-btn-sm" lay-filter="user-save" lay-submit="" type="submit">
                        &lt;!&ndash;<i class="layui-icon layui-icon-ok"></i>&ndash;&gt;
                        <i class="layui-icon layui-icon-refresh"></i>
                        提交
                    </button>-->

                    <button id="btnSubmit" class="pear-btn pear-btn-sm" lay-filter="user-save" lay-submit="" type="submit">
                        <!--<i class="layui-icon layui-icon-ok"></i>-->
                        <i class="layui-icon layui-icon-ok"></i>
                        提交
                    </button>

                    &nbsp;&nbsp;
                    <button id="btnReset" class="pear-btn pear-btn-sm" type="reset">
                        <i class="layui-icon layui-icon-refresh"></i>
                        重置
                    </button>
                </div>

            </div>
        </div>
    </div>
    <!--<div class="bottom">
        <div class="button-container" >
            <button class="pear-btn pear-btn-primary pear-btn-sm" lay-filter="user-save" lay-submit="" type="submit">
                <i class="layui-icon layui-icon-ok"></i>
                提交
            </button>
            <button class="pear-btn pear-btn-sm" type="reset">
                <i class="layui-icon layui-icon-refresh"></i>
                重置
            </button>
        </div>
    </div>-->
</form>
<th:block th:include="include :: footer"/>
<script th:src="@{/pagejs/im/pushObjectManage/add.js}" type="text/javascript"></script>

<script>
</script>
</body>
</html>
