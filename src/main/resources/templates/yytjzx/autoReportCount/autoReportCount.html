<head>
    <th:block th:include="include :: header('自助取数统计')"/>

    <style>
        .layui-layout-admin {
            display: flex;
            height: 100%; /* 高度设为100%视口高度，根据需要调整 */

        }
        .layui-left {
            width: 250px; /* 左侧宽度 */
            height: 100%;
            /*background-color: #f2f2f2;*/
            overflow: auto; /* 如果内容过多，可以有滚动条 */

            border-right: #92b8b1 dashed 1px;
        }
        .layui-right {
            flex: 1; /* 右侧自适应 */
            /*background-color: #fff;*/
            overflow-y: auto;
            margin-left: 20px;
        }

        /* 添加到你的 CSS 文件中 */
        .layui-table {
            border: 1px solid #92b8b1 !important;
            border-collapse: collapse !important;
        }

        .layui-table th,
        .layui-table td {
            border: 1px solid #92b8b1 !important;
        }

        /* 如果需要表头边框 */
        /*.layui-table thead th {
            border-bottom: 2px solid #92b8b1 !important;
        }*/

        /* 所有表头单元格 */
        .layui-table-header th {
            background-color: #f2f2f2  !important;
            color: #333;
        }

        .custom-tooltip {
            position: relative;
            cursor: pointer;
        }

        .custom-tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 5px 8px;
            border-radius: 3px;
            white-space: nowrap;
            z-index: 1000;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .custom-tooltip:hover::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #333;
            margin-bottom: -5px;
        }


    </style>

</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form action="" class="layui-form">

            <div id="layui-layout-admin" class="layui-layout-admin">
                <!--左侧内容-->
                <div class="layui-left">
                    <div id="dimension"></div>
                </div>

                <!--右侧内容-->
                <div class="layui-right">

                    <div class="layui-form-item" style="margin-bottom: 0px;border: #e03e2d solid 0px;">
                        <label class="layui-form-label">统计范围：</label>
                        <div class="layui-input-inline" style="width: 15%;border: #e03e2d solid 0px;">
                            <input type="text" class="layui-input" id="area" name="area" th:value="${area}" readonly>
                            <input type="hidden" class="layui-input" id="areaId" name="areaId" th:value="${areaId}" readonly>
                            <input type="hidden" class="layui-input" id="areaCode" name="areaCode" >
                        </div>
                        <label class="layui-form-label" id="startDateLabel" name="startDateLabel">开始时间：</label>
                        <div class="layui-input-inline" style="width: 15%;border: #e03e2d solid 0px;">
                            <input type="text" class="layui-input" id="startDate" name="startDate" readonly>
                        </div>
                        <label class="layui-form-label" id="endDateLabel" name="endDateLabel">结束时间：</label>
                        <div class="layui-input-inline" style="width: 15%;border: #e03e2d solid 0px;">
                            <input type="text" class="layui-input" id="endDate" name="endDate" readonly>
                        </div>

                        <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="file-query" lay-submit>
                            <i class="layui-icon layui-icon-search"></i>
                            查询
                        </button>

                        <a id="downloadFile" class="pear-btn pear-btn-md pear-btn-primary" lay-filter="downloadFile" lay-submit>
                            <i class="pear-icon pear-icon-direction-down"></i>
                            导出
                        </a>

                    </div>

                        <div>
                            <div id="card-body-div" class="layui-card-body" style="background-color: #FFFFFF;">
                                <table id="file-table" lay-filter="file-table" class="layui-table"></table>
                            </div>
                        </div>


                        <div style="border-top: #92b8b1 dashed 1px;margin-top: 20px;">
                            <div>
                                <div id="card-body-div-sub" class="layui-card-body" style="background-color: #FFFFFF;">
                                    <table id="file-table-sub" lay-filter="file-table-sub" class="layui-table"></table>
                                </div>
                            </div>
                        </div>

                </div>
            </div>

        </form>
    </div>
</div>

</body>

        /**
         * 初始化查询日期
         */
        function initDate(){
            var currentDate = getCurrentDate();
            var lastMonthDate = getLastMonthDate();

            // 1. 直接设置 input 的 value（Laydate 会自动更新显示）
            $('#startDate').val(lastMonthDate);
            $('#endDate').val(currentDate);
        }

        // 格式化日期函数
        function formatDate(date) {
            var y = date.getFullYear();
            var m = date.getMonth() + 1;
            var d = date.getDate();
            return y + '-' + (m < 10 ? '0' + m : m) + '-' + (d < 10 ? '0' + d : d);
        }

        // 获取前一个月日期
        function getLastMonthDate() {
            var now = new Date();
            var lastMonth = new Date(now);
            lastMonth.setMonth(now.getMonth() - 1);
            return formatDate(lastMonth);
        }

        // 获取当前日期
        function getCurrentDate() {
            return formatDate(new Date());
        }
