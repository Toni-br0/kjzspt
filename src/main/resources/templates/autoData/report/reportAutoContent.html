<script>
    layui.use(['tree', 'layer','form','laydate','table','popup'], function(){
        var tree = layui.tree;
        var layer = layui.layer;
        var form = layui.form;
        var laydate = layui.laydate;
        let table = layui.table;
        let popup = layui.popup;
        form.render('radio');
        form.render('checkbox');
        var $ = layui.$;

        //获取父页面的报表名称
        var parentReportName = parent.$("#reportName").val();
        $("#autoReportName").val(parentReportName);

        //获取当前登录用户的IM推送对象
        $.ajax({
            url: "/im/pushObjectManage/getPushObjectByLogin",
            dataType: 'json',
            contentType: 'application/json',
            type: 'post',
            success: function (result) {
                if (result.retCode == "0") {
                    var pushObjectId = result.pushManageId;
                    var pushObjectName = result.pushObjectName;

                    $("#pushObjectId").val(pushObjectId);
                    $("#pushObjectName").val(pushObjectName);

                }
            }
        })

        window.sendCycleFilter = function(obj) {
            // 逻辑代码
            var sendCycleValue = obj.value;
            if(sendCycleValue == "daily"){ //每日
                $("#selSendMonthDiv").hide();
            }else{ //每月
                var daysInMonth = getDaysInMonth();
                // 获取下拉框元素
                var $selSendMonth = $('#selSendMonth');
                // 清空下拉框
                $selSendMonth.empty();
                // 添加天数选项
                for (var i = 1; i <= daysInMonth; i++) {
                    // 创建option元素并添加到下拉框
                    if(i <10){
                        $selSendMonth.append($('<option>', {
                            value: '0'+i,
                            text: i + '日'
                        }));
                    }else{
                        $selSendMonth.append($('<option>', {
                            value: i,
                            text: i + '日'
                        }));
                    }

                }

                // 可选：设置当前日期为默认选中
                var today = new Date();
                var currentDay = today.getDate();
                if(currentDay <10){
                    currentDay = "0"+currentDay;
                }
                $selSendMonth.val(currentDay);

                $("#selSendMonthDiv").show();
            }
        }

        // 获取当月天数
        function getDaysInMonth() {
            const date = new Date(); // 当前日期
            const year = date.getFullYear();
            const month = date.getMonth() + 1; // 月份从0开始，需+1

            // 下个月的第0天 = 当前月的最后一天
            return new Date(year, month, 0).getDate();
        }


        /**
         * 推送至领导
         */
        form.on('submit(pust-leader)', function (data) {

            var autoReportName = $("#autoReportName").val();
            if(autoReportName.trim() == ""){
                layer.alert("报表名称不能为空");
                return;
            }

            layer.open({
                type: 2, // 0-4 分别代表不同类型的层
                title: '推送对象申请',
                //content: autoContent,
                content: '/autoData/report/selPustLeader',
                area: ['600px', '630px'], // 宽高
                offset: 'auto', // 位置
                skin: 'custom-layer layer-title-center', // 应用自定义样式类
                shadeClose: false, // 点击遮罩不关闭
                zIndex: layer.zIndex + 100, // 确保层级最高（覆盖其他元素）
                btn: ['确定', '取消'], // 按钮
                yes: function(index, layero){
                    var iframe = layero.find('iframe')[0];
                    var addPushLeaderId = iframe.contentWindow.document.getElementById('addPushLeaderId').value;
                    console.log(addPushLeaderId);
                    if(addPushLeaderId == ""){
                        layer.alert("请选择推送对象");
                        return;
                    }

                    $("#addPushLeaderId").val(addPushLeaderId);
                    var pustTime = iframe.contentWindow.document.getElementById('pustTime').value;
                    $("#pushTime").val(pustTime);

                    layer.close(index);
                }
            })
        })

    });

</script>
