<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('报表详情')"/>

    <style>
        /* 高亮样式 */
        .search-highlight {
            font-weight: bold;
            background-color: #fffbe6;
            padding: 0 4px;
            border-radius: 3px;
        }

        .quotaHighlight {
            color: #1e90ff;
            font-weight: bold;
        }

        .dimensionHighlight {
            color: #1e90ff;
            font-weight: bold;
        }
    </style>

</head>
<body class="pear-container">
<div class="layui-row layui-col-space10">
    <div class="layui-col-md3">
        <div class="layui-card">
            <div class="layui-card-body" style="border-radius: 1px;">
                <div class="layui-card nav click-but">
                    <div class="panel-box">
                        <input id="currArea" name="currArea" type="hidden" th:value="${currArea}">
                        <div class="layui-card-header layui-card-header-opt" >分类</div>
                        <div style="border-bottom: #F0F0F0 dashed 1px;"></div>
                        <div class="layui-card-body layui-card-body-opt" style="height: 80px;padding: 5px 5px;" >
                            <div class="layui-form" id="classify">
                                <!--<input type="checkbox" id="yd"  value="yd" title="移动" lay-skin="primary" lay-filter="optionFilter">
                                <input type="checkbox" id="kd" value="kd" title="宽带" lay-skin="primary" lay-filter="optionFilter">
                                <input type="checkbox" id="itv" value="itv" title="ITV" lay-skin="primary" lay-filter="optionFilter">
                                <input type="checkbox" id="zj" value="zj" title="智家" lay-skin="primary" lay-filter="optionFilter">-->

                                <input lay-skin="primary" name="hobby" th:each="reportClassify:${reportClassifys}"
                                       th:title="${reportClassify.classifyName}" th:value="${reportClassify.classifyId}" th:id="${reportClassify.classifyId}"
                                       type="checkbox" lay-filter="optionClassifys">

                            </div>
                        </div>
                    </div>
                    <div class="panel-box">
                        <div class="layui-card-header layui-card-header-opt" style="margin-bottom: 10px;">
                            指标
                            <input type="text" id="quotaSearch" name ="quotaSearch" style="width: 60%;height: 20px;margin-left: 5px;"/>
                            <!--<button style="font-size: 13px;margin-left: 5px;" lay-filter="query-quota-but" lay-submit="" type="submit" >查询</button>-->
                            <button lay-filter="query-quota-but" lay-submit style="width: 30px;height: 25px;border: none;background-color: #FFFFFF;">
                                <i class="layui-icon layui-icon-search"></i>
                            </button>
                        </div>
                        <div style="border-bottom: #F0F0F0 dashed 1px;"></div>
                        <div class="layui-card-body layui-card-body-opt" id="quota"></div>
                    </div>
                    <div class="panel-box">
                        <div style="border: solid 0px blue;width: 100%;height: 25px;display: flex;margin-bottom: 15px;">
                            <div style="display: flex;">
                                <button style="font-size: 13px;" lay-filter="sel-all-quanqu" lay-submit="" type="submit" id="btnQq">&nbsp;全区&nbsp; </button>
                                <button style="font-size: 13px;margin-left: 10px;" lay-filter="sel-all-dishi" lay-submit="" type="submit" id="btnDs"> &nbsp;地市&nbsp; </button>
                                <button style="font-size: 13px;margin-left: 10px;" lay-filter="sel-all-quxian" lay-submit="" type="submit" id="btnQx"> &nbsp;区县&nbsp; </button>
                                <button style="font-size: 13px;margin-left: 10px;" lay-filter="sel-all-wangge" lay-submit="" type="submit" id="btnWg"> &nbsp;网格&nbsp; </button>
                            </div>
                            <div style="display: flex;"></div>
                        </div>

                        <div class="layui-form" style="margin-top: 0px;display: flex;">
                            <div style="display: flex;">
                                <input type="radio" id="isNonNtand" name="isNonNtand" value="0" title="标准维度" lay-filter="isNonNtandFilter" >
                            </div>
                            <div style="display: none;" id="isNonNtandDiv">
                                <input type="radio" id="isNonNtand" name="isNonNtand" value="1" title="非标准维度" lay-filter="isNonNtandFilter">
                            </div>

                        </div>

                        <div class="layui-card-header layui-card-header-opt" style="margin-bottom: 10px;">
                            维度
                            <input type="text" id="dimensionSearch" name ="dimensionSearch" style="width: 60%;height: 20px;margin-left: 5px;"/>
                            <!--<button style="font-size: 13px;margin-left: 5px;" lay-filter="query-dimension-but" lay-submit="" type="submit">查询</button>-->
                            <button lay-filter="query-dimension-but" lay-submit style="width: 30px;height: 25px;border: none;background-color: #FFFFFF;">
                                <i class="layui-icon layui-icon-search"></i>
                            </button>
                        </div>
                        <div style="border-bottom: #F0F0F0 dashed 1px;"></div>
                        <div class="layui-card-body layui-card-body-opt"id="dimension"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-col-md9">
        <div class="layui-card">
            <div class="layui-card-body">
                <div class="layui-form-item">

                    <label class="layui-form-label">报表名称：</label>
                    <div class="layui-input-inline" style="width: 46%;">
                        <input id="reportName" name="reportName" type="text"  lay-verify="required" placeholder="请输入报表名称" autocomplete="off" class="layui-input">
                    </div>

                    <!--<label class="layui-form-label">客户：</label>
                    <div class="layui-input-inline">
                        <div class="layui-form" style="margin-top: 0px;">
                            <input type="checkbox" id="zhengqi" name="custType" value="zhengqi" title="政企">
                            <input type="checkbox" id="gongzhong" name="custType" value="gongzhong" title="公众">
                        </div>
                    </div>-->
                    <label class="layui-form-label">客户类型：</label>
                    <div class="layui-input-inline">

                        <div class="layui-form" style="margin-top: 0px;">
                            <select name="custType" id="custType" lay-filter="custTypeSel">
                                <option value=""></option>
                                <option th:each="khlx:${zzqsKhlxs}" th:text="${khlx.dataLabel}" th:value="${khlx.dataValue}"></option>
                            </select>
                        </div>

                    </div>


                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">数据周期：</label>
                    <div class="layui-input-inline" style="width: 18%; border: #e03e2d solid 0px;">
                        <div class="layui-form" style="margin-top: 0px;">
                            <input type="radio" id="day" name="dateType" value="day" title="日" lay-filter="dateTypeRadio">
                            <input type="radio" id="month" name="dateType" value="month" title="月" lay-filter="dateTypeRadio">
                        </div>
                    </div>

                    <label class="layui-form-label">分析角色：</label>
                    <div class="layui-input-inline" style="width: 30%;border: #e03e2d solid 0px;">
                        <div class="layui-form" style="margin-top: 0px;">
                            <input type="radio" id="roleType" name="roleType" value="customer" title="客户" checked lay-filter="roleTypeRadio">
                            <input type="radio" id="roleType" name="roleType" value="user" title="用户" lay-filter="roleTypeRadio">
                            <input type="radio" id="roleType" name="roleType" value="account" title="账户" lay-filter="roleTypeRadio">
                        </div>
                    </div>

                    <label class="layui-form-label">指标类型：</label>
                    <div class="layui-input-inline" style="width: 10%;border: #e03e2d solid 0px;">
                        <div class="layui-form" style="margin-top: 0px;">
                            <input type="radio" id="indexType" name="indexType" value="count" title="统计" checked lay-filter="indexTypeRadio">
                            <!--<input type="radio" id="indexType" name="indexType" value="details" title="明细" lay-filter="indexTypeRadio">-->
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div style="display: flex;">
                        <label class="layui-form-label">指标：</label>
                        <div class="layui-input-inline" style="width: 70%;overflow: auto;">
                            <div id="col-zone" class="selected-zone"></div>
                        </div>
                        <div class="layui-input-inline" style="width: 20%;display: flex;">
                            <button lay-filter="clear-col-zone" lay-submit style="height: 35px;width: 50px;">
                                <!--<i class="layui-icon layui-icon-clear"></i>-->
                                清除
                            </button>
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div style="display: flex;">
                        <label class="layui-form-label">维度：</label>
                        <div class="layui-input-inline" style="width: 70%;overflow: auto;">
                            <div id="row-zone" class="selected-zone"></div>
                        </div>
                        <div class="layui-input-inline" style="width: 20%;display: flex;">
                            <button lay-filter="clear-row-zone" lay-submit style="height: 35px;width: 50px;">
                                <!--<i class="layui-icon layui-icon-clear"></i>-->
                                清除
                            </button>

                            <form class="layui-form">
                                <div style="border: red dashed 0px;margin-left: 15px;margin-top: -15px;">
                                    <input type="checkbox" id="xyjwd" name="xyjwd" value="1"
                                           title="下一级维度" lay-skin="primary" lay-filter="xyjwdFilter">
                                </div>

                            </form>

                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">条件：</label>
                    <div id="tjDiv" class="layui-input-inline" style="width: 90%;text-align: left;display: flex;justify-content: left;
                         flex-wrap: wrap;">


                    </div>


                </div>


                <div class="layui-form-item" style="margin-bottom: 0px;">
                    <label class="layui-form-label">开始日期：</label>
                    <div class="layui-input-inline" style="width: 10%;border: #e03e2d solid 0px;">
                        <input type="text" class="layui-input" id="startDate" name="startDate" readonly>
                    </div>
                    <label class="layui-form-label">结束日期：</label>
                    <div class="layui-input-inline" style="width: 10%;border: #e03e2d solid 0px;">
                        <input type="text" class="layui-input" id="endDate" name="endDate" readonly>
                    </div>

                    <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="report-search" lay-submit="" type="submit">
                        <!--<i class="layui-icon layui-icon-search"></i>-->
                        查询报表
                    </button>
                    <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="report-reset" lay-submit="" type="submit">
                        <!--<i class="layui-icon layui-icon-refresh"></i>-->
                        重置
                    </button>
                    <!--<button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="report-save" lay-submit="" type="submit">
                        <i class="layui-icon layui-icon-add-circle"></i>
                        保存报表
                    </button>-->

                    <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="template-save" lay-submit="" type="submit">
                        <!--<i class="layui-icon layui-icon-add-circle"></i>-->
                        保存模板
                    </button>

                    <button id="exportReport" class="pear-btn pear-btn-md pear-btn-primary" lay-filter="report-export" lay-submit="" type="submit">
                        <!--<i class="layui-icon layui-icon-export"></i>-->
                        导出报表
                    </button>
                    <button id="autoReportBtn" class="pear-btn pear-btn-md pear-btn-primary" lay-filter="auto-report" lay-submit="" type="submit">
                        <!--<i class="layui-icon layui-icon-add-circle"></i>-->
                        自动化报表
                    </button>

                    <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="report-return" lay-submit="" type="submit">
                        <!--<i class="layui-icon layui-icon-return"></i>-->
                        返回
                    </button>
                </div>
            </div>
        </div>
        <div class="layui-card">
            <div id="card-body-div" class="layui-card-body" style="background-color: #FFFFFF;">
                <table id="report-table" lay-filter="report-table"></table>
            </div>
        </div>
    </div>
</div>

</body>

<th:block th:include="include :: footer"/>
<script>
    var urlParams = new URLSearchParams(window.location.search);
    var templateId = urlParams.get('templateId');
    //console.log(templateId);

    layui.use(['tree', 'layer','form','laydate','table','popup'], function(){

        var tree = layui.tree;
        var layer = layui.layer;
        var form = layui.form;
        var laydate = layui.laydate;
        let table = layui.table;
        let popup = layui.popup;
        form.render('radio');
        form.render('checkbox');
        var $ = layui.$;
        var quota = false;
        var col = false;
        var row = false;

        let loading = layer.load();

        var quota;
        var dimension;
        var reportName;
        var selDateTypeValue =""; //数据周期选中的值
        var selRoleTypeValue =""; //分析角色选中值
        var selIndexTypeValue =""; ///指标类型选中值


        var zhengqi = document.getElementById('zhengqi');
        var gongzhong = document.getElementById('gongzhong');
        var day = document.getElementById('day');
        var month = document.getElementById('month');


        let MODULE_PATH = "/autoData/report/";

        var colZone = document.getElementById('col-zone');
        var colHeaders = [];
        var colHeadersArr = [];

        var rowZone = document.getElementById('row-zone');
        var rowHeaders = [];
        var rowHeadersArr = [];

        var quotaData = new Array();

        colZone.addEventListener('click', function() {
            col = true;
            row = false;
            this.classList.toggle('active');
        });
        rowZone.addEventListener('click', function() {
            col = false;
            row = true;
            this.classList.toggle('active');
        });
        // 点击其他地方取消激活状态
        document.addEventListener('click', function(e) {
            if (!colZone.contains(e.target)) {
                colZone.classList.remove('active');
            }
            if (!rowZone.contains(e.target)) {
                rowZone.classList.remove('active');
            }
        });

        //设置分类复选框不可用
        $('input[lay-filter="optionClassifys"]').each(function() {
            $(this).prop('disabled', true);
        });
        form.render('checkbox');

        //设置全区，地市，区县，网格显示不显示
        var currArea = $("#currArea").val();
        if(currArea =="hx_latn_name"){ //地市
            $('#btnQq').hide();
        }else if(currArea =="hx_area_name"){ //区县
            $('#btnQq').hide();
            $('#btnDs').hide();
        }else if(currArea =="x_hx5_bp_name"){ //网格
            $('#btnQq').hide();
            $('#btnDs').hide();
            $('#btnQx').hide();
        }

        //选中指标的表名称
        var checkTableName ="";

        //标准非标准单选按钮选中的是否是同一个值
        var selIsNonNtandFilterValue ="";

        var param = new Object();
        param.templateId = templateId;
        // var loadIndex = layer.load(1, {shade: [0.5, '#000']});
        $.ajax({
            url: MODULE_PATH + 'templateInfo',
            data: JSON.stringify(param),
            dataType: 'json',
            contentType: 'application/json',
            type: 'post',
            async: false,
            success: function (result) {
                layer.close(loading);
                if (result.retCode == '0') {
                    dimension = result.dimension;//已选维度
                    quota = result.quota; // 表的列
                    reportName = result.templateName;
                    document.getElementById('reportName').value = result.templateName;
                    checkTableName = result.indexTableName;
                    selIsNonNtandFilterValue = result.isNonNtand;

                    /*if (result.custZq != null && result.custZq == '1') {
                        zhengqi.checked = true;
                    }
                    if (result.custGz != null && result.custGz == '1') {
                        gongzhong.checked = true;
                    }*/

                    //指标中包含环比的 结束时间为空不可用
                    if(quota.indexOf("\"indexClass\":\"hb\"") >=0){
                        $("#endDate").val("");
                        $("#endDate").attr("disabled",true);
                    }

                    //用户类型
                    $("#custType").val(result.custType);
                    form.render('select');

                    //数据周期
                    $("input[name='dateType'][value='" + result.dateType + "']").prop("checked", true);
                    selDateTypeValue = result.dateType;
                    if(selDateTypeValue == "day"){ //日
                        laydate.render({
                            elem: '#startDate', //指定元素
                            type: 'date',
                            format: 'yyyy-MM-dd',
                            max: -1,
                            lang:'cn'
                        });

                        laydate.render({
                            elem: '#endDate', //指定元素
                            type: 'date',
                            format: 'yyyy-MM-dd',
                            max: -1,
                            lang:'cn'
                        });

                    }else{ //月
                        laydate.render({
                            elem: '#startDate', //指定元素
                            type: 'month',
                            format: 'yyyy-MM',
                            max: -1,
                            lang:'cn'

                        });

                        laydate.render({
                            elem: '#endDate', //指定元素
                            type: 'month',
                            format: 'yyyy-MM',
                            max: -1,
                            lang:'cn'

                        });
                    }

                    $("#startDate").val(result.startDate);
                    $("#endDate").val(result.endDate);

                    //分析角色
                    $("input[name='roleType'][value='" + result.roleType + "']").prop("checked", true);
                    selRoleTypeValue = result.roleType;

                    //指标类型
                    $("input[name='indexType'][value='" + result.indexType + "']").prop("checked", true);
                    selIndexTypeValue = result.indexType;

                    //设置导出按钮和自动化报表按钮不可用
                    if(selIndexTypeValue == "details"){ //明细
                        // 设置导出按钮不可用
                        $('#exportReport').prop('disabled', true);
                        // 添加 Layui 禁用样式（更美观）
                        $('#exportReport').addClass('layui-disabled');
                        $('#exportReport').hide();

                        // 设置自动化报表按钮不可用
                        $('#autoReportBtn').prop('disabled', true);
                        $('#autoReportBtn').addClass('layui-disabled');
                        $('#autoReportBtn').hide();
                    }

                    //条件
                    $('#tjDiv').html(result.whereStr);

                    var whereCheck = result.whereCheck;
                    //console.log("whereCheck: "+whereCheck);
                    if(whereCheck != null && whereCheck != ""){
                        var whereArr = JSON.parse(whereCheck);
                        // 使用jQuery遍历
                        $.each(whereArr, function(index, item) {
                            //console.log("索引：" + index + "，id：" + item.id + "，名称：" + item.name +", check: "+item.isCheck);
                            var isCheck = item.isCheck;
                            if(isCheck == "是"){
                                $("input[name='"+item.name+"'][value='是']").prop("checked", true);
                            }else if(isCheck == "否"){
                                $("input[name='"+item.name+"'][value='否']").prop("checked", true);
                            }
                        });
                    }

                    form.render('radio');

                    //分类
                    var reportClassify = result.reportClassify;
                    //console.log("reportClassify: "+reportClassify);
                    if(reportClassify != null && reportClassify != ""){
                        var reportClassifyArr = reportClassify.split(";");
                        for(var i=0;i<reportClassifyArr.length;i++){
                            var reportClassifyId = reportClassifyArr[i];
                            document.getElementById(reportClassifyId).checked = true;
                            var addClassify = getClassify(reportClassifyId);

                            if(addClassify != null){
                                quotaData.push(addClassify);
                            }
                        }
                    }

                    //下一级维度
                    var xyjwdValue = result.xyjwd;
                    if(xyjwdValue == "0"){
                        $('#xyjwd').prop('checked', false);
                    }else{
                        $('#xyjwd').prop('checked', true);
                    }

                    form.render('checkbox');

                    const quotaArray = JSON.parse(quota);
                    for (var i = 0; i < quotaArray.length; i++) {
                        var quotaItem = quotaArray[i];
                        //添加指标数据到指标文本框
                        addToReportQuota(quotaItem);
                    }

                    //加载指标树
                    var lastClickTime = 0;
                    var timeoutDuration = 300; // 双击间隔时间阈值，单位毫秒
                    optionInst = tree.render({
                        elem: '#quota',
                        data: quotaData,
                        id: 'quotaTree',
                        showCheckbox: false,
                        isJump: true,
                        click: function (obj) {
                            var currentTime = new Date().getTime();
                            if (currentTime - lastClickTime < timeoutDuration) {
                                addToReportQuota(obj.data);
                            }else {
                                lastClickTime = currentTime; // 更新点击时间，以便下一次点击时检查是否为双击
                            }

                        }
                    });
                    if (dimension != null) {
                        const dimensionArr = JSON.parse(dimension);
                        for (var i = 0; i < dimensionArr.length; i++) {
                            var dimensionItem = dimensionArr[i];
                            addToReportDimension(dimensionItem);
                        }
                    }

                    //校验那些分类可用
                    var checkdateType = result.dateType;
                    var checkRoleType = result.roleType;
                    var checkIndexType = result.indexType;

                    setClassState(checkdateType,checkRoleType,checkIndexType);

                    /*const cols = JSON.parse(result.cols)
                    let col = new Array();
                    col.push(cols);
                    console.log("col::::"+col)
                    table.render({
                        elem: '#report-table',
                        url: MODULE_PATH + 'reportList',
                        where: {
                            quota:result.quota,
                            dimension: result.dimension,
                            isQf:result.isQf,
                            isHy:result.isHy,
                            isFiveg:result.isFiveg,
                            isFivegb:result.isFivegb,
                            isFivegtc:result.isFivegtc,
                            isQzxsp:result.isQzxsp,
                            isQzsl:result.isQzsl,
                            isSfllb:result.isSfllb,
                            isQzxq:result.isQzxq
                        },
                        page: true,
                        cols: col,
                        skin: 'line'
                    });*/

                    //根据值选中标准维度 或非标准维度
                    var queryIsNonStand = result.isNonStand;

                    $('input[name="isNonNtand"][value="' + queryIsNonStand + '"]').prop('checked', true);
                    form.render('radio');

                }else {
                    layer.alert(result.retMsg);
                    return;
                }
            }
        })


        var lastClickTime = 0;
        var timeoutDuration = 300; // 双击间隔时间阈值，单位毫秒
        // 加载维度树数据
        var dimensionData = getDimensionData();
        var dimensionInst = tree.render({
            elem: '#dimension',
            data: dimensionData,
            id: 'dimensionTree',  // 定义索引
            // showCheckbox: true,  // 是否显示复选框
            isJump: true,  // 是否允许点击节点时弹出新窗口跳转
            //onlyIconControl: true,  // 仅允许通过图标展开
            click: function(obj){
                var currentTime = new Date().getTime();
                if (currentTime - lastClickTime < timeoutDuration) {

                    //2025-11-20
                    var clickDimension = new Object();
                    clickDimension.columnName = obj.data.columnName;
                    clickDimension.id = obj.data.id;
                    clickDimension.title = obj.data.title;
                    clickDimension.level = obj.data.level;

                    // 如果是双击事件
                    //addToReportDimension(obj.data);
                    addToReportDimension(clickDimension);
                } else {
                    lastClickTime = currentTime; // 更新点击时间，以便下一次点击时检查是否为双击
                }

            }
        });

        /**
         * 分类复选框事件
         */
        var optionInst;
        form.on('checkbox(optionClassifys)', function(data){
            if(data.elem.checked) {
                quotaData.push(getClassify(data.value));
            } else {
                removeOption(quotaData,data.value);
                $("#reportName").val("");

        /**
         * 查找并删除指标选中框的内容
         * @param data
         * @returns {*|null}
         */
        function findAndDelIndex(data) {

            if(data != null){
                // 检查当前节点是否匹配
                var indexId = data.id;
                //console.log(indexId);
                if(indexId != null){
                    //根据父ID，根据子ID删除指标文件框的内容
                    $("#col-zone").find("#"+indexId).remove();

                    const delIndex = colHeaders.indexOf(indexId);
                    if (delIndex !== -1) {
                        colHeaders.splice(delIndex, 1); // 从 index 位置开始删除 1 个元素
                        colHeadersArr.splice(delIndex, 1);
                    }

                    //$("#tjDiv").find("#tj_"+indexId).remove();
                    var childTjDivs = document.getElementById("tjDiv").querySelectorAll(".selTjClassDiv_"+indexId);
                    // 删除所有匹配的子div
                    childTjDivs.forEach(function(delDiv) {
                        delDiv.remove();
                    });
                }


                // 递归检查子节点
                if (data.children && data.children.length > 0) {
                    for (const child of data.children) {
                        const result = findAndDelIndex(child);
                        if (result) return result; // 找到即返回
                    }
                }
            }else{
                return null; // 未找到
            }

        }

        // 递归搜索树节点
        function searchNode(nodes,keyword) {

                // 检查当前节点是否匹配

            var hasMatch = false;

            nodes.forEach(function(node) {
                // 检查当前节点是否匹配
                var isMatch = node.title.toLowerCase().indexOf(keyword) !== -1;
                var currentHasMatch = isMatch; // 当前节点自己的匹配状态

                // 递归搜索子节点
                if (node.children && node.children.length > 0) {
                    var childHasMatch = searchNode(node.children, keyword);
                    currentHasMatch = currentHasMatch || childHasMatch; // 合并子节点匹配状态
                }

                // 仅当当前节点匹配或子节点有匹配时才展开
                node.spread = currentHasMatch; // 直接使用当前节点的匹配状态

                // 累加整个数组的匹配状态
                hasMatch = hasMatch || currentHasMatch;
            });

            return hasMatch;

        }

        // 定义获取当前日期时间的函数
        function getCurrentDateTime() {
            var now = new Date();
            // 获取年、月、日
            var year = now.getFullYear();
            var month = String(now.getMonth() + 1).padStart(2, '0'); // 月份从0开始，需加1
            var day = String(now.getDate()).padStart(2, '0');

            // 获取时、分、秒
            var hours = String(now.getHours()).padStart(2, '0');
            var minutes = String(now.getMinutes()).padStart(2, '0');
            var seconds = String(now.getSeconds()).padStart(2, '0');

            // 拼接成指定格式
            return `${year}${month}${day}${hours}${minutes}${seconds}`;
        }
