<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('推送至领导审批管理')"/>
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form action="" class="layui-form">
            <div class="layui-form-item">

                <label class="layui-form-label">报表名称:</label>
                <div class="layui-input-inline">
                    <input  class="layui-input"  name="reportName" id="reportName" placeholder="" type="text">
                </div>

                <label class="layui-form-label">申请人:</label>
                <div class="layui-input-inline">
                    <input  class="layui-input"  name="applyPersonName" id="applyPersonName" placeholder="" type="text">
                </div>

                <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="file-query" lay-submit>
                    <i class="layui-icon layui-icon-search"></i>
                    查询
                </button>
                <button class="pear-btn pear-btn-md" type="reset">
                    <i class="layui-icon layui-icon-refresh"></i>
                    重置
                </button>
            </div>
        </form>
    </div>
</div>

<div class="layui-card">
    <div id="card-body-div" class="layui-card-body" style="background-color: #FFFFFF;">
        <table id="file-table" lay-filter="file-table"></table>
    </div>
</div>

</body>

<script id="role-toolbar" type="text/html">


    <!--<button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
        <i class="layui-icon layui-icon-username"></i>
        审批
    </button>-->

</script>

<script id="role-bar" type="text/html">
    <button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="leaderAppr"><i class="layui-icon layui-icon-username"></i>
    </button>

</script>

<script id="file-image" type="text/html">
    <a href="javascript:void(0);" class="pear-text">查看</a>
</script>


<script id="state-name" type="text/html">
    {{#if (d.state == '0') { }}
    <span>未执行</span>
    {{# }else if(d.state == '1'){ }}
    <span>执行中</span>
    {{# } }}
</script>

<script id="date-type" type="text/html">
    {{#if (d.dateType == 'day') { }}
    <span>日</span>
    {{# }else if(d.dateType == 'month'){ }}
    <span>月</span>
    {{# } }}
</script>

<script id="send-cycle" type="text/html">
    {{#if (d.sendCycle == 'daily') { }}
    <span>每日</span>
    {{# }else if(d.sendCycle == 'monthly'){ }}
    <span>每月</span>
    {{# } }}
</script>

<script id="create-time" type="text/html">
    {{layui.util.toDateString(d.createTime,  'yyyy-MM-dd HH:mm:ss')}}
</script>

<script id="apply-time" type="text/html">
    {{layui.util.toDateString(d.applyTime,  'yyyy-MM-dd HH:mm:ss')}}
</script>

<script id="apply-state" type="text/html">
    {{#if (d.applyState == '1') { }}
    <span>待审批</span>
    {{# }else if(d.applyState == '2'){ }}
    <span>审批通过</span>
    {{# }else if(d.applyState == '3'){ }}
    <span>审批不通过</span>
    {{# } }}
</script>


<th:block th:include="include :: footer"/>
<script>
    layui.use(['table', 'form', 'jquery', 'popup', 'common'], function () {
        let table = layui.table;
        let form = layui.form;
        let $ = layui.jquery;
        let popup = layui.popup;
        let common = layui.common;

        let MODULE_PATH = "/autoData/pustLeaderApproval/";

        //获取页面高度
        var pageHeight = $(document).height();
        $('#card-body-div').height(pageHeight-148);


        let cols = [
            [
                {type: 'checkbox'},
                {title: 'ID', field: 'approvalId', align: 'center',hide: true},
                {title: '报表名称', field: 'reportName', align: 'center'},
                {title: '报表推送时间', field: 'pushTime', align: 'center',width: 120},
                {title: '推送领导', field: 'pushLeaderName', align: 'center',width: 200},
                {title: '申请人', field: 'applyPersonName', align: 'center',width: 120},
                {title: '申请日期', field: 'createTime', align: 'center',templet: "#create-time",width: 160},
                {title: '审批状态', field: 'applyState', align: 'center',width: 100,templet: "#apply-state"},
                {title: '审批人', field: 'approPersonName', align: 'center',width: 160},
                {title: '审批时间', field: 'applyTime', align: 'center',templet: "#apply-time",width: 160},
                {title: '审批意见', field: 'applyOpinion', align: 'center',width: 200},
                {title: '操作', toolbar: '#role-bar', align: 'center', width: 150}
            ]
        ]

        table.render({
            elem: '#file-table',
            url: MODULE_PATH + 'getPustLeaderApprovalList',
            page: true,
            cols: cols,
            skin: 'line',
            //height: 'full-148',
            toolbar: '#role-toolbar',
            defaultToolbar: [{
                title: '刷新',
                layEvent: 'refresh',
                icon: 'layui-icon-refresh',
            }, 'filter', 'print', 'exports']
        });

        table.on('tool(file-table)', function (obj) {
            if (obj.event === 'remove') {
                window.remove(obj);
            } else if (obj.event === 'file-image') {
                window.show(obj);
            } else if (obj.event === 'edit') {
                window.edit(obj);
            } else if (obj.event === 'add') {
                window.add();
            } else if(obj.event =='editModel'){
                window.editModel();
            } else if(obj.event =='leaderAppr'){
                window.leaderAppr(obj);
            }
        });

        table.on('toolbar(file-table)', function (obj) {

            if (obj.event === 'add') {
                window.add();
            } else if (obj.event === 'refresh') {
                window.refresh();
            } else if (obj.event === 'batchRemove') {
                window.batchRemove(obj);
            } else if (obj.event === 'edit') {
                window.edit(obj);
            } else if(obj.event =='editModel'){
                window.editModel();
            } else if(obj.event =='leaderAppr'){
                window.leaderAppr(obj);
            }
        });

        form.on('submit(file-query)', function (data) {
            table.reload('file-table', {where: data.field})
            return false;
        });


        /**
         * 领导审批
         * @param obj
         */
        window.leaderAppr = function (obj) {

            //根据ID获取审批状态
            let loading = layer.load();

            var paramState = new Object();
            paramState.approvalId = obj.data['approvalId'];

            $.ajax({
                url: "/autoData/pustLeaderApproval/getApplyState",
                data: JSON.stringify(paramState),
                dataType: 'json',
                contentType: 'application/json',
                type: 'post',
                success: function (result) {
                    layer.close(loading);
                    if (result.retCode =='0') {
                        var applyState = result.applyState;
                        if(applyState != "1"){ //领导已审批过
                            popup.failure("此记录已审批过,请勿重复审批");
                            return false;
                        }

                        layer.open({
                            type: 2, // 0-4 分别代表不同类型的层
                            title: '审批',
                            //content: autoContent,
                            content: '/autoData/pustLeaderApproval/toLeaderAppr',
                            area: ['550px', '430px'], // 宽高
                            offset: 'auto', // 位置
                            skin: 'custom-layer layer-title-center', // 应用自定义样式类
                            shadeClose: false, // 点击遮罩不关闭
                            //zIndex: layer.zIndex + 100, // 确保层级最高（覆盖其他元素）
                            btn: ['确定', '取消'], // 按钮
                            yes: function(index, layero){
                                var iframe = layero.find('iframe')[0];

                                //审批结果
                                var applyResult = iframe.contentWindow.document.querySelector('input[id="applyResult"]:checked').value;

                                //审批意见
                                var applyOpinion = iframe.contentWindow.document.getElementById('applyOpinion').value;

                                var approvalId = obj.data['approvalId'];

                                var param = new Object();
                                param.approvalId = approvalId;
                                param.applyResult = applyResult;
                                param.applyOpinion = applyOpinion;

                                let loading = layer.load();
                                $.ajax({
                                    url: "/autoData/pustLeaderApproval/saveApplyResult",
                                    data: JSON.stringify(param),
                                    dataType: 'json',
                                    contentType: 'application/json',
                                    type: 'post',
                                    success: function (result) {
                                        layer.close(loading);
                                        if (result.retCode =='0') {
                                            popup.success(result.retMsg, function () {
                                                //obj.del();
                                                table.reload('file-table');
                                            });
                                        } else {
                                            popup.failure(result.retMsg);
                                        }
                                    }
                                })

                                layer.close(index);
                            }
                        })

                    } else {
                        popup.failure(result.retMsg);
                    }
                }
            })

        }

        window.batchRemove = function (obj) {
            let infoIds = common.checkField(obj, 'infoId');
            if (common.isEmpty(infoIds)) {
                popup.warning("未选中数据");
                return false;
            }
            layer.confirm('确定要删除选中的记录', {icon: 3, title: '提示'}, function (index) {
                layer.close(index);
                let loading = layer.load();
                $.ajax({
                    url: MODULE_PATH + "batchRemove/" + infoIds,
                    dataType: 'json',
                    type: 'delete',
                    success: function (result) {
                        layer.close(loading);
                        if (result.retCode =='0') {
                            popup.success(result.retMsg, function () {
                                table.reload('file-table');
                            });
                        } else {
                            popup.failure(result.retMsg);
                        }
                    }
                })
            });
        }

        window.edit = function (obj) {
            layer.open({
                type: 2,
                title: '修改',
                shade: 0.1,
                area: ['550px', '550px'],
                content: MODULE_PATH + 'toEditTask?infoId=' + obj.data['infoId']
            });
        }



        window.refresh = function () {
            table.reload('file-table');
        }
    })
</script>
</html>
