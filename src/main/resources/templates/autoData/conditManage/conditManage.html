<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('条件管理')"/>
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form action="" class="layui-form">
            <div class="layui-form-item">

                <label class="layui-form-label">条件编码:</label>
                <div class="layui-input-inline">
                    <input  class="layui-input"  name="conditCode" id="conditCode" placeholder="" type="text">
                </div>

                <label class="layui-form-label">条件名称:</label>
                <div class="layui-input-inline">
                    <input  class="layui-input"  name="conditName" id="conditName" placeholder="" type="text">
                </div>

                <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="file-query" lay-submit>
                    <i class="layui-icon layui-icon-search"></i>
                    查询
                </button>
                <button class="pear-btn pear-btn-md" type="reset">
                    <i class="layui-icon layui-icon-refresh"></i>
                    重置
                </button>
            </div>
        </form>
    </div>
</div>

<div class="layui-card">
    <div id="card-body-div" class="layui-card-body" style="background-color: #FFFFFF;">
        <table id="file-table" lay-filter="file-table"></table>
    </div>
</div>

</body>

<script id="role-toolbar" type="text/html">
    <button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
        <i class="pear-icon pear-icon-add"></i>
        新增
    </button>

    <button class="pear-btn pear-btn-md" lay-event="batchRemove">
        <i class="layui-icon layui-icon-delete"></i>
        删除
    </button>

</script>

<script id="role-bar" type="text/html">
    <button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="edit"><i class="pear-icon pear-icon-edit"></i>
    </button>
    <button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="remove"><i class="pear-icon pear-icon-ashbin"></i>
    </button>

</script>

<script id="file-image" type="text/html">
    <a href="javascript:void(0);" class="pear-text">查看</a>
</script>


<script id="state-name" type="text/html">
    {{#if (d.state == 0) { }}
    <span>无效</span>
    {{# }else if(d.state == 1){ }}
    <span>有效</span>
    {{# } }}
</script>

<script id="create-time" type="text/html">
    {{layui.util.toDateString(d.createTime,  'yyyy-MM-dd HH:mm:ss')}}
</script>

<th:block th:include="include :: footer"/>
<script>
    layui.use(['table', 'form', 'jquery', 'popup', 'common'], function () {
        let table = layui.table;
        let form = layui.form;
        let $ = layui.jquery;
        let popup = layui.popup;
        let common = layui.common;

        let MODULE_PATH = "/autoData/conditManage/";

        //获取页面高度
        var pageHeight = $(document).height();
        $('#card-body-div').height(pageHeight-148);


        let cols = [
            [
                {type: 'checkbox'},
                {title: '条件ID', field: 'conditId', align: 'center',hide: true},
                {title: '条件编码', field: 'conditCode', align: 'center',width: 200},
                {title: '条件名称', field: 'conditName', align: 'center',width: 200},
                {title: '条件值1', field: 'conditValue1', align: 'center',width: 150},
                {title: '条件值2', field: 'conditValue2', align: 'center',width: 150},
                {title: '条件值3', field: 'conditValue3', align: 'center',width: 150},
                {title: '条件值4', field: 'conditValue4', align: 'center',width: 150},
                {title: '条件值5', field: 'conditValue5', align: 'center',width: 150},
                {title: '条件值6', field: 'conditValue6', align: 'center',width: 150},
                {title: '条件值7', field: 'conditValue7', align: 'center',width: 150},
                {title: '条件值8', field: 'conditValue8', align: 'center',width: 150},
                {title: '条件值9', field: 'conditValue9', align: 'center',width: 150},
                {title: '条件值10', field: 'conditValue10', align: 'center',width: 150},
                {title: '条件值11', field: 'conditValue11', align: 'center',width: 150},
                {title: '条件值12', field: 'conditValue12', align: 'center',width: 150},
                {title: '条件值13', field: 'conditValue13', align: 'center',width: 150},
                {title: '条件值14', field: 'conditValue14', align: 'center',width: 150},
                {title: '条件值15', field: 'conditValue15', align: 'center',width: 150},
                {title: '所属指标', field: 'indexName', align: 'center',width: 200},
                {title: '创建时间', field: 'createTime', align: 'center',templet: "#create-time",width: 160},
                {title: '创建人', field: 'realName', align: 'center',width: 120},
                {title: '排序序号', field: 'sortId', align: 'center',width: 120},
                {title: '操作', toolbar: '#role-bar', align: 'center', width: 150}
            ]
        ]

        table.render({
            elem: '#file-table',
            url: MODULE_PATH + 'getConditList',
            page: true,
            cols: cols,
            skin: 'line',
            //height: 'full-148',
            toolbar: '#role-toolbar',
            defaultToolbar: [{
                title: '刷新',
                layEvent: 'refresh',
                icon: 'layui-icon-refresh',
            }, 'filter', 'print', 'exports']
        });

        table.on('tool(file-table)', function (obj) {
            if (obj.event === 'remove') {
                window.remove(obj);
            } else if (obj.event === 'file-image') {
                window.show(obj);
            } else if (obj.event === 'edit') {
                window.edit(obj);
            } else if (obj.event === 'add') {
                window.add();
            } else if(obj.event =='editModel'){
                window.editModel();
            }
        });

        table.on('toolbar(file-table)', function (obj) {

            if (obj.event === 'add') {
                window.add();
            } else if (obj.event === 'refresh') {
                window.refresh();
            } else if (obj.event === 'batchRemove') {
                window.batchRemove(obj);
            } else if (obj.event === 'edit') {
                window.edit(obj);
            } else if(obj.event =='editModel'){
                window.editModel();
            }
        });

        form.on('submit(file-query)', function (data) {
            table.reload('file-table', {where: data.field})
            return false;
        });

        window.add = function () {
            layer.open({
                type: 2,
                title: '新增',
                shade: 0.1,
                area: ['550px', '500px'],
                content: MODULE_PATH + 'toAddCondit'
            });
        }

        window.remove = function (obj) {
            layer.confirm('确定要删除该记录', {icon: 3, title: '提示'}, function (index) {
                layer.close(index);
                let loading = layer.load();
                $.ajax({
                    url: MODULE_PATH + "remove/" + obj.data['conditId'],
                    dataType: 'json',
                    type: 'delete',
                    success: function (result) {
                        layer.close(loading);
                        if (result.retCode =='0') {
                            popup.success(result.retMsg, function () {
                                //obj.del();
                                table.reload('file-table');
                            });
                        } else {
                            popup.failure(result.retMsg);
                        }
                    }
                })
            });
        }

        window.batchRemove = function (obj) {
            let conditIds = common.checkField(obj, 'conditId');
            if (common.isEmpty(conditIds)) {
                popup.warning("未选中数据");
                return false;
            }
            layer.confirm('确定要删除选中的记录', {icon: 3, title: '提示'}, function (index) {
                layer.close(index);
                let loading = layer.load();
                $.ajax({
                    url: MODULE_PATH + "batchRemove/" + conditIds,
                    dataType: 'json',
                    type: 'delete',
                    success: function (result) {
                        layer.close(loading);
                        if (result.retCode =='0') {
                            popup.success(result.retMsg, function () {
                                table.reload('file-table');
                            });
                        } else {
                            popup.failure(result.retMsg);
                        }
                    }
                })
            });
        }

        window.edit = function (obj) {
            layer.open({
                type: 2,
                title: '修改',
                shade: 0.1,
                area: ['550px', '500px'],
                content: MODULE_PATH + 'toEditCondit?conditId=' + obj.data['conditId']
            });
        }



        window.refresh = function () {
            table.reload('file-table');
        }
    })
</script>
</html>
