<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('字典类型列表')"/>
</head>
<body class="pear-container">
<div class="layui-row layui-col-space10">
    <div class="layui-col-md12">
        <div class="layui-card">
            <div class="layui-card-body" style="display: flex;">
                <div style="width: 50%;display: flex;">
                    <form action="" class="layui-form">
                        <div class="layui-form-item">
                            <label class="layui-form-label">父指标名称</label>
                            <div class="layui-input-inline">
                                <input class="layui-input" name="indexName" placeholder="" type="text">
                            </div>
                            <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="dict-type-query" lay-submit>
                                <i class="layui-icon layui-icon-search"></i>
                                查询
                            </button>
                            <button class="pear-btn pear-btn-md" type="reset">
                                <i class="layui-icon layui-icon-refresh"></i>
                                重置
                            </button>
                        </div>
                    </form>
                </div>

                <div style="width: 50%;display: flex;">
                    <form action="" class="layui-form">
                        <div class="layui-form-item">
                            <label class="layui-form-label">指标名称</label>
                            <div class="layui-input-inline">
                                <input class="layui-input" name="indexName" placeholder="" type="text">
                            </div>
                            <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="dict-data-query" lay-submit>
                                <i class="layui-icon layui-icon-search"></i>
                                查询
                            </button>
                            <button class="pear-btn pear-btn-md" type="reset">
                                <i class="layui-icon layui-icon-refresh"></i>
                                重置
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
    <div class="layui-col-md6">
        <div class="layui-card">
            <div class="layui-card-body">
                <table id="dict-type-table" lay-filter="dict-type-table"></table>
            </div>
        </div>
    </div>
    <div class="layui-col-md6">
        <div class="layui-card">
            <div class="layui-card-body">
                <svg class="empty" height="152" style="margin-top: 50px;margin-left: 220px;margin-bottom: 80px;"
                     viewBox="0 0 184 152" width="184" xmlns="http://www.w3.org/2000/svg">
                    <g fill="none" fillRule="evenodd">
                        <g transform="translate(24 31.67)">
                            <ellipse cx="67.797" cy="106.89" fill="#F5F5F7" fillOpacity=".8" rx="67.797"
                                     ry="12.668"></ellipse>
                            <path d="M122.034 69.674L98.109 40.229c-1.148-1.386-2.826-2.225-4.593-2.225h-51.44c-1.766 0-3.444.839-4.592 2.225L13.56 69.674v15.383h108.475V69.674z"
                                  fill="#AEB8C2"></path>
                            <path d="M101.537 86.214L80.63 61.102c-1.001-1.207-2.507-1.867-4.048-1.867H31.724c-1.54 0-3.047.66-4.048 1.867L6.769 86.214v13.792h94.768V86.214z"
                                  fill="url(#linearGradient-1)" transform="translate(13.56)"></path>
                            <path d="M33.83 0h67.933a4 4 0 0 1 4 4v93.344a4 4 0 0 1-4 4H33.83a4 4 0 0 1-4-4V4a4 4 0 0 1 4-4z"
                                  fill="#F5F5F7"></path>
                            <path d="M42.678 9.953h50.237a2 2 0 0 1 2 2V36.91a2 2 0 0 1-2 2H42.678a2 2 0 0 1-2-2V11.953a2 2 0 0 1 2-2zM42.94 49.767h49.713a2.262 2.262 0 1 1 0 4.524H42.94a2.262 2.262 0 0 1 0-4.524zM42.94 61.53h49.713a2.262 2.262 0 1 1 0 4.525H42.94a2.262 2.262 0 0 1 0-4.525zM121.813 105.032c-.775 3.071-3.497 5.36-6.735 5.36H20.515c-3.238 0-5.96-2.29-6.734-5.36a7.309 7.309 0 0 1-.222-1.79V69.675h26.318c2.907 0 5.25 2.448 5.25 5.42v.04c0 2.971 2.37 5.37 5.277 5.37h34.785c2.907 0 5.277-2.421 5.277-5.393V75.1c0-2.972 2.343-5.426 5.25-5.426h26.318v33.569c0 .617-.077 1.216-.221 1.789z"
                                  fill="#DCE0E6"></path>
                        </g>
                        <path d="M149.121 33.292l-6.83 2.65a1 1 0 0 1-1.317-1.23l1.937-6.207c-2.589-2.944-4.109-6.534-4.109-10.408C138.802 8.102 148.92 0 161.402 0 173.881 0 184 8.102 184 18.097c0 9.995-10.118 18.097-22.599 18.097-4.528 0-8.744-1.066-12.28-2.902z"
                              fill="#DCE0E6"></path>
                        <g fill="#FFF" transform="translate(149.65 15.383)">
                            <ellipse cx="20.654" cy="3.167" rx="2.849" ry="2.815"></ellipse>
                            <path d="M5.698 5.63H0L2.898.704zM9.259.704h4.985V5.63H9.259z"></path>
                        </g>
                    </g>
                </svg>
                <table id="dict-data-table" lay-filter="dict-data-table"></table>
            </div>
        </div>
    </div>
</div>

</body>
<script id="dict-type-toolbar" type="text/html">
    <button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
        <i class="layui-icon layui-icon-add-1"></i>
        新增
    </button>
    <!--<button class="pear-btn pear-btn-md" lay-event="batchRemove">
        <i class="layui-icon layui-icon-delete"></i>
        删除
    </button>-->
</script>

<script id="dict-type-bar" type="text/html">
    <button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="edit">
        <i class="layui-icon layui-icon-edit"></i>
    </button>
    <button class="pear-btn pear-btn-warming pear-btn-sm" lay-event="details">
        <i class="layui-icon layui-icon-transfer"></i>
    </button>
    <button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="remove">
        <i class="layui-icon layui-icon-delete"></i>
    </button>
</script>

<script id="dict-type-enable" type="text/html">
    <input type="checkbox" value="{{d.id}}" lay-skin="switch" lay-text="启用|禁用" lay-filter="dict-type-enable"
           {{d.enable== '0' ? 'checked' : '' }}>
</script>

<script id="dict-data-toolbar" type="text/html">
    <button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
        <i class="layui-icon layui-icon-add-1"></i>
        新增
    </button>
    <button class="pear-btn pear-btn-md" lay-event="batchRemove">
        <i class="layui-icon layui-icon-delete"></i>
        删除
    </button>

    <label style="margin-left: 15px;font-size: 14px;">父指标名称：</label>
    <label style="margin-left: 10px;font-size: 14px;" id="dispIndexName" name ="dispIndexName"></label>

</script>

<script id="dict-data-bar" type="text/html">
    <button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="edit"><i class="layui-icon layui-icon-edit"></i>
    </button>
    <button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="remove"><i class="layui-icon layui-icon-delete"></i>
    </button>
</script>

<script id="dict-data-enable" type="text/html">
    <input type="checkbox" value="{{d.dataId}}" lay-skin="switch" lay-text="启用|禁用" lay-filter="dict-data-enable"
           {{d.enable== '0' ? 'checked' : '' }}>
</script>

<script id="index-type" type="text/html">
    {{#if (d.indexType == "count") { }}
    <span>统计</span>
    {{# }else if(d.indexType == "details"){ }}
    <span>明细</span>
    {{# } }}
</script>

<script id="data-cycle" type="text/html">
    {{#if (d.dataCycle == "day") { }}
    <span>日</span>
    {{# }else if(d.dataCycle == "month"){ }}
    <span>月</span>
    {{# } }}
</script>

<script id="is-five-inten" type="text/html">
    {{#if (d.isFiveInten == "1") { }}
    <span>是</span>
    {{# }else if(d.isFiveInten == "0"){ }}
    <span>否</span>
    {{# } }}
</script>

<script id="anal-role" type="text/html">
    {{#if (d.analRole == "customer") { }}
    <span>客户</span>
    {{# }else if(d.analRole == "user"){ }}
    <span>用户</span>
    {{# }else if(d.analRole == "account"){ }}
    <span>账户</span>
    {{# } }}
</script>

<script id="index-class" type="text/html">
    {{#if (d.indexClass == "lv") { }}
    <span>率</span>
    {{# }else if(d.indexClass == "tb"){ }}
    <span>同比</span>
    {{# }else if(d.indexClass == "hb"){ }}
    <span>环比</span>
    {{# }else if(d.indexClass == "zb"){ }}
    <span>占比</span>
    {{# } }}
</script>


<th:block th:include="include :: footer"/>
<script th:inline="javascript">
    layui.use(['table', 'form', 'jquery', 'popup','common'], function () {
        let table = layui.table;
        let form = layui.form;
        let $ = layui.jquery;
        let popup = layui.popup;
        let common = layui.common;

        let typeCode;

        var selParentId ="";

        let cols = [
            [
                {type: 'checkbox'},
                {title: '指标ID', field: 'indexId', align: 'left',hide:true},
                {title: '指标名称', field: 'indexName', align: 'left',width: 182},
                {title: '父指标名称', field: 'parentIndexName', align: 'left',width: 120},
                {title: '指标类型', field: 'indexType', align: 'center', width: 85, templet: '#index-type'},
                {title: '数据周期', field: 'dataCycle', align: 'center', width: 85,templet: '#data-cycle'},
                {title: '分析角色', field: 'analRole', align: 'center', width: 85,templet: '#anal-role'},
                {title: '分类名称', field: 'classifyName',  align: 'center',width: 85},
                {title: '统计大宽表', field: 'isFiveInten',  align: 'center',width: 95,templet: '#is-five-inten'},
                {title: '操作', toolbar: '#dict-type-bar', align: 'center', width: 140, fixed: 'right'}
            ]
        ];

        let dataCols = [
            [
                {type: 'checkbox'},
                {field: 'indexName', title: '指标名称', align: 'left', minWidth: 200},
                {field: 'indexType', title: '指标类型',align: 'center',templet: "#index-type", minWidth: 90},
                {field: 'dataCycle', title: '数据周期',align: 'center',templet: "#data-cycle", minWidth: 90},
                {field: 'analRole', title: '分析角色',align: 'center',templet: "#anal-role", minWidth: 90},
                /*{field: 'isQuery', title: '是否查询条件',align: 'center',templet: "#is-query", minWidth: 90},*/
                {field: 'classifyName', title: '分类名称', align: 'center',minWidth: 120},
                {field: 'tableName', title: '表名', align: 'left',minWidth: 200},
                {field: 'columnName', title: '列名', align: 'left',minWidth: 150},
                {field: 'tableExpr', title: '表达式', align: 'center',minWidth: 250},
                {field: 'createTime', title: '创建时间',align: 'center',templet: "#create-time",width: 170},
                {field: 'sortId', title: '排序ID', align: 'center',width: 80},
                {field: 'realName', title: '创建人', align: 'center',width: 100},
                {field: 'indexClass', title: '指标分类', align: 'center',width: 110,templet: "#index-class"},
                {title: '统计大宽表', field: 'isFiveInten',  align: 'center',width: 95,templet: '#is-five-inten'},
                {field: 'indexId', title: '指标ID', align: 'center',hide: true},
                {title: '操作', toolbar: '#dict-data-bar', align: 'center', width: 100, fixed: 'right'}
            ]
        ];

        table.render({
            elem: '#dict-type-table',
            url: '/autoData/indexManage/getIndexListNew',
            page: true,
            cols: cols,
            skin: 'line',
            height: 'full-148',
            toolbar: '#dict-type-toolbar',
            defaultToolbar: [{
                title: '刷新',
                layEvent: 'refresh',
                icon: 'layui-icon-refresh',
            }, 'filter', 'print', 'exports']
        });

        window.renderData = function (obj) {
            var parentId = obj.data['indexId'];
            selParentId = obj.data['indexId'];
            $(".empty").hide();
            table.render({
                elem: '#dict-data-table',
                url: '/autoData/indexManage/getIndexSubList?parentId=' + parentId,
                page: true,
                height: 'full-148',
                cols: dataCols,
                skin: 'line',
                toolbar: '#dict-data-toolbar',
                defaultToolbar: [{
                    title: '刷新',
                    layEvent: 'refresh',
                    icon: 'layui-icon-refresh',
                }, 'filter', 'print', 'exports']
            });

            $("#dispIndexName").text(obj.data['indexName']);
        }

        table.on('tool(dict-type-table)', function (obj) {
            if (obj.event === 'remove') {
                window.removeType(obj);
            } else if (obj.event === 'edit') {
                window.editType(obj);
            } else if (obj.event === 'details') {
                window.renderData(obj)
            }
        });

        table.on('toolbar(dict-type-table)', function (obj) {
            if (obj.event === 'add') {
                window.addType();
            } else if (obj.event === 'refresh') {
                window.refreshType();
            }
        });

        form.on('submit(dict-type-query)', function (data) {
            table.reload('dict-type-table', {where: data.field});
            return false;
        });


        form.on('switch(dict-type-enable)', function (obj) {
            let operate;
            if (obj.elem.checked) {
                operate = "enable";
            } else {
                operate = "disable";
            }
            let loading = layer.load()
            $.ajax({
                url: '/system/dictType/' + operate,
                data: JSON.stringify({id: this.value, typeCode: typeCode}),
                dataType: 'json',
                contentType: 'application/json',
                type: 'put',
                success: function (result) {
                    layer.close(loading);
                    if (result.success) {
                        popup.success(result.msg);
                    } else {
                        popup.failure(result.msg);
                    }
                }
            })
        });

        window.addType = function () {
            layer.open({
                type: 2,
                title: '新增',
                shade: 0.1,
                area: ['580px', '600px'],
                content: '/autoData/indexManage/toParentAdd'
            });
        }

        window.editType = function (obj) {
            layer.open({
                type: 2,
                title: '修改',
                shade: 0.1,
                area: ['580px', '600px'],
                content: '/autoData/indexManage/toParentEdit?indexId=' + obj.data['indexId']
            });
        }

        window.removeType = function (obj) {
            layer.confirm('确定要删除该记录', {icon: 3, title: '提示'}, function (index) {
                layer.close(index);
                let loading = layer.load();
                $.ajax({
                    url: "/autoData/indexManage/remove/" + obj.data['indexId'],
                    dataType: 'json',
                    type: 'delete',
                    success: function (result) {
                        layer.close(loading);

                        if(result.retCode =='0') {
                            popup.success(result.retMsg, function () {
                                obj.del();
                                table.reload('dict-type-table');
                            });
                        } else {
                            popup.failure(result.retMsg);
                        }

                    }
                })
            });
        }

        window.refreshType = function () {
            table.reload('dict-type-table');
        }

        window.addData = function () {
            layer.open({
                type: 2,
                title: '新增',
                shade: 0.1,
                area: ['580px', '785px'],
                content: '/autoData/indexManage/toAdd?selParentId='+selParentId
            });
        }

        window.editData = function (obj) {
            layer.open({
                type: 2,
                title: '修改',
                shade: 0.1,
                area: ['580px', '785px'],
                content: '/autoData/indexManage/toEdit?indexId=' + obj.data['indexId']
            });
        }

        window.removeData = function (obj) {
            layer.confirm('确定要删除该记录', {icon: 3, title: '提示'}, function (index) {
                layer.close(index);
                let loading = layer.load();
                $.ajax({
                    url: "/autoData/indexManage/remove/" + obj.data['indexId'],
                    dataType: 'json',
                    type: 'delete',
                    success: function (result) {
                        layer.close(loading);

                        if(result.retCode =='0') {
                            popup.success(result.retMsg, function () {
                                obj.del();
                                table.reload('dict-data-table');
                            });
                        } else {
                            popup.failure(result.retMsg);
                        }
                    }
                })
            });
        }

        window.batchRemove = function (obj) {
            let indexIds = common.checkField(obj, 'indexId');
            if (common.isEmpty(indexIds)) {
                popup.warning("未选中文件");
                return false;
            }

            layer.confirm('确定要删除该记录', {icon: 3, title: '提示'}, function (index) {
                layer.close(index);
                let loading = layer.load();
                $.ajax({
                    url: "/autoData/indexManage/batchRemove/" + indexIds,
                    dataType: 'json',
                    type: 'delete',
                    success: function (result) {
                        layer.close(loading);

                        if(result.retCode =='0') {
                            popup.success(result.retMsg, function () {
                                table.reload('dict-data-table');
                            });
                        } else {
                            popup.failure(result.retMsg);
                        }
                    }
                })
            });
        }

        table.on('tool(dict-data-table)', function (obj) {
            if (obj.event === 'remove') {
                window.removeData(obj);
            } else if (obj.event === 'edit') {
                window.editData(obj);
            } else if (obj.event === 'details') {
                window.details(obj);
            }else if (obj.event === 'batchRemove') {
                window.batchRemove(obj);
            }
        });

        table.on('toolbar(dict-data-table)', function (obj) {
            if (obj.event === 'add') {
                window.addData();
            } else if (obj.event === 'refresh') {
                window.refreshData();
            }else if (obj.event === 'batchRemove') {
                window.batchRemove(obj);
            }
        });

        form.on('submit(dict-data-query)', function (data) {
            data.field.typeCode = typeCode;
            table.reload('dict-data-table', {where: data.field})
            return false;
        });

        form.on('switch(dict-data-enable)', function (obj) {
            let operate;
            if (obj.elem.checked) {
                operate = "enable";
            } else {
                operate = "disable";
            }
            let loading = layer.load()
            $.ajax({
                url: '/system/dictData/' + operate,
                data: JSON.stringify({dataId: this.value, typeCode: typeCode}),
                dataType: 'json',
                contentType: 'application/json',
                type: 'put',
                success: function (result) {
                    layer.close(loading);
                    if (result.success) {
                        popup.success(result.msg);
                    } else {
                        popup.failure(result.msg);
                    }
                }
            })
        });

        window.refreshData = function () {
            table.reload('dict-data-table');
        }
    })
</script>
</html>
