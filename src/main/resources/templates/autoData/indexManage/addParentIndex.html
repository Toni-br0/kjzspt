<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('指标新增')"/>
</head>
<body>
<form action="" class="layui-form">
    <div class="mainBox">
        <div class="main-container">
            <div class="main-container">
                <div class="layui-form-item">
                    <label class="layui-form-label">上级</label>
                    <div class="layui-input-block">
                        <ul class="dtree" data-id="0" id="selectParent" name="parentId"></ul>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label"><span style="color: red;">*</span>指标名称</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="indexName" placeholder="请输入指标名称"
                               type="text">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">指标类型</label>
                    <div class="layui-input-block">
                        <input checked name="indexType" title="统计" type="radio" value="count"/>
                        <input name="indexType" title="明细" type="radio" value="details"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">数据周期</label>
                    <div class="layui-input-block">
                        <input checked name="dataCycle" title="日" type="radio" value="day"/>
                        <input name="dataCycle" title="月" type="radio" value="month"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">分析角色</label>
                    <div class="layui-input-block">
                        <input checked name="analRole" title="客户" type="radio" value="customer"/>
                        <input name="analRole" title="用户" type="radio" value="user"/>
                        <input name="analRole" title="账户" type="radio" value="account"/>
                    </div>
                </div>

                <!--<div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;width: 100px;">是否查询条件</label>
                    <div class="layui-input-block">
                        <input name="isQuery" title="是" type="radio" checked value="1"/>
                    </div>
                </div>-->

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;"><span style="color:red;">*</span>所属分类</label>
                    <div class="layui-input-block">
                        <select name="classifyId" id="classifyId" lay-filter="classifyId" lay-verify="required">
                            <option th:each="reportClassify:${reportClassifys}" th:text="${reportClassify.classifyName}" th:value="${reportClassify.classifyId}"></option>
                        </select>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">表名</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" lay-verify="required" class="layui-input" name="tableName" id="tableName" placeholder="请输入表名" type="text">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;margin-right: 15px;">包含非标准维度</label>
                    <div class="layui-input-block">
                        <input name="isIncludeNoStand" title="不包含" type="radio" value="0" checked/>
                        <input name="isIncludeNoStand" title="包含" type="radio" value="1"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;margin-right: 15px;">统计大宽表</label>
                    <div class="layui-input-block">
                        <input name="isFiveInten" title="否" type="radio" value="0" checked/>
                        <input name="isFiveInten" title="是" type="radio" value="1"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">排序</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" name="sortId" placeholder="请输入排序" type="number">
                    </div>
                </div>



            </div>
        </div>
    </div>
    <div class="bottom">
        <div class="button-container">
            <button class="pear-btn pear-btn-primary pear-btn-sm" lay-filter="dept-save" lay-submit="" type="submit">
                <i class="layui-icon layui-icon-ok"></i>
                提交
            </button>
            <button class="pear-btn pear-btn-sm" type="reset">
                <i class="layui-icon layui-icon-refresh"></i>
                重置
            </button>
        </div>
    </div>
</form>
<th:block th:include="include :: footer"/>
<script>
    layui.use(['form', 'jquery', 'dtree'], function () {
        let form = layui.form;
        let $ = layui.jquery;
        let dtree = layui.dtree;

        dtree.renderSelect({
            elem: "#selectParent",
            url: "/autoData/indexManage/getIndextree?isQuery=1",
            method: 'get',
            selectInputName: {nodeId: "parentId", context: "indexName"},
            skin: "layui",
            dataFormat: "list",
            response: {treeId: "indexId", parentId: "parentId", title: "indexName"},
            selectInitVal: "1"
        });

        //单击节点 监听事件
        dtree.on("node('selectParent')" ,function(object){
            var selNodeId = object.param.nodeId;

            $.ajax({
                url: "/autoData/indexManage/getTypeClass/" + selNodeId,
                dataType: 'json',
                type: 'get',
                success: function (result) {

                    if (result.retCode == '0') {
                        var indexType = result.indexType;
                        var classifyId = result.classifyId;
                        var dataCycle = result.dataCycle;
                        var analRole = result.analRole;
                        var isFiveInten = result.isFiveInten; //统计大宽表
                        var isIncludeNoStand = result.isIncludeNoStand; //标准维度 非标准维度

                        if(indexType !="0" && classifyId != "0"){
                            // 设置值
                            document.querySelector('input[name="indexType"][value="'+indexType+'"]').checked = true;

                            document.querySelector('input[name="dataCycle"][value="'+dataCycle+'"]').checked = true;

                            document.querySelector('input[name="analRole"][value="'+analRole+'"]').checked = true;

                            document.querySelector('input[name="isFiveInten"][value="'+isFiveInten+'"]').checked = true;

                            document.querySelector('input[name="isIncludeNoStand"][value="'+isIncludeNoStand+'"]').checked = true;

                            var radios = document.querySelectorAll('input[type=radio]'); // Select all radio buttons
                            radios.forEach(function(radio) {
                                radio.disabled = true; // Disable each radio button manually if no other method is available in Layui's form module API.
                            });

                            form.render('radio'); // 只渲染单选按钮部分，提高效率

                            document.querySelector('select[name="classifyId"]').value = classifyId; // 手动设置value
                            $('#classifyId').prop('disabled', true);
                            form.render('select'); // 更新渲染select，使之生效

                            var tableName = result.tableName;
                            $("#tableName").val(tableName);

                        }else{
                            document.querySelector('input[name="indexType"][value="count"]').checked = true;
                            var radios = document.querySelectorAll('input[type=radio]'); // Select all radio buttons
                            radios.forEach(function(radio) {
                                radio.disabled = false; // Disable each radio button manually if no other method is available in Layui's form module API.
                            });
                            form.render('radio'); // 只渲染单选按钮部分，提高效率

                            $('#classifyId').val($('#classifyId option:first').val());
                            $('#classifyId').prop('disabled', false);
                            form.render('select'); // 更新渲染select，使之生效

                            $("#tableName").val("");
                        }
                    } else {
                        document.querySelector('input[name="indexType"][value="count"]').checked = true;
                        var radios = document.querySelectorAll('input[type=radio]'); // Select all radio buttons
                        radios.forEach(function(radio) {
                            radio.disabled = false; // Disable each radio button manually if no other method is available in Layui's form module API.
                        });
                        form.render('radio'); // 只渲染单选按钮部分，提高效率

                        $('#classifyId').prop('disabled', false);
                        form.render('select'); // 更新渲染select，使之生效

                        $("#tableName").val("");
                    }
                }
            })

        });


        form.on('submit(dept-save)', function (data) {
            data.field.isQuery = "1";

            $.ajax({
                url: '/autoData/indexManage/saveIndex',
                data: JSON.stringify(data.field),
                dataType: 'json',
                contentType: 'application/json',
                type: 'post',
                success: function (result) {
                    if (result.retCode == "0") {
                        layer.msg(result.retMsg, {icon: 1, time: 2000}, function () {
                            parent.layer.close(parent.layer.getFrameIndex(window.name));
                            parent.layui.table.reload("dict-type-table");
                        });
                    } else {
                        layer.msg(result.retMsg, {icon: 2, time: 3000});
                    }
                }
            })
            return false;
        });
    })
</script>
<script>
</script>
</body>
</html>
