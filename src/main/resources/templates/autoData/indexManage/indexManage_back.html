<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('指标管理')"/>
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form action="" class="layui-form">
            <div class="layui-form-item">
                <label class="layui-form-label">指标名称</label>
                <div class="layui-input-inline">
                    <input class="layui-input" name="indexName" placeholder="" type="text">
                </div>
                <button class="pear-btn pear-btn-md pear-btn-primary" lay-filter="dept-query" lay-submit>
                    <i class="layui-icon layui-icon-search"></i>
                    查询
                </button>
                <button class="pear-btn pear-btn-md" type="reset">
                    <i class="layui-icon layui-icon-refresh"></i>
                    重置
                </button>
            </div>
        </form>
    </div>
</div>

<div class="layui-card">
    <div class="layui-card-body">
        <table id="dept-table" lay-filter="dept-table"></table>
    </div>
</div>

<script id="dept-toolbar" type="text/html">
    <button sec:authorize="hasPermission('/system/dept/add','sys:dept:add')"
            class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
        <i class="layui-icon layui-icon-add-1"></i>
        新增
    </button>
</script>

<script id="dept-bar" type="text/html">
    <button sec:authorize="hasPermission('/system/dept/edit','sys:dept:edit')"
            class="pear-btn pear-btn-primary pear-btn-sm" lay-event="edit"><i class="layui-icon layui-icon-edit"></i>
    </button>
    <button sec:authorize="hasPermission('/system/dept/remove','sys:dept:remove')"
            class="pear-btn pear-btn-danger pear-btn-sm" lay-event="remove"><i class="layui-icon layui-icon-delete"></i>
    </button>
</script>

</body>

<th:block th:include="include :: footer"/>

<script id="create-time" type="text/html">
    {{layui.util.toDateString(d.createTime,  'yyyy-MM-dd HH:mm:ss')}}
</script>

<script id="index-type" type="text/html">
    {{#if (d.indexType == "count") { }}
    <span>统计</span>
    {{# }else if(d.indexType == "details"){ }}
    <span>明细</span>
    {{# } }}
</script>

<script id="data-cycle" type="text/html">
    {{#if (d.dataCycle == "day") { }}
    <span>日</span>
    {{# }else if(d.dataCycle == "month"){ }}
    <span>月</span>
    {{# } }}
</script>

<script id="anal-role" type="text/html">
    {{#if (d.analRole == "customer") { }}
    <span>客户</span>
    {{# }else if(d.analRole == "user"){ }}
    <span>用户</span>
    {{# }else if(d.analRole == "account"){ }}
     <span>账户</span>
    {{# } }}
</script>

<script id="is-query" type="text/html">
    {{#if (d.isQuery == "1") { }}
    <span>是</span>
    {{# }else if(d.isQuery == "0"){ }}
    <span>否</span>
    {{# } }}
</script>

<script id="index-class" type="text/html">
    {{#if (d.indexClass == "lv") { }}
    <span>率</span>
    {{# }else if(d.indexClass == "tb"){ }}
    <span>同比</span>
    {{# }else if(d.indexClass == "hb"){ }}
    <span>环比</span>
    {{# } }}
</script>

<script>
    layui.use(['table', 'form', 'jquery', 'treetable', 'popup'], function () {
        let table = layui.table;
        let form = layui.form;
        let $ = layui.jquery;
        let treetable = layui.treetable;
        let popup = layui.popup;

        let MODULE_PATH = "/autoData/indexManage/";

        treetable.render({
            treeColIndex: 1,
            treeSpid: 0,
            treeIdName: 'indexId',
            treePidName: 'parentId',
            skin: 'line',
            method: 'get',
            treeDefaultClose: false,
            toolbar: '#dept-toolbar',
            elem: '#dept-table',
            url: '/autoData/indexManage/getIndexList',
            /*page: true,
            limits: [10, 20, 30, 40, 50, 100],
            limit: 10,*/
            initLevel: 0,
            treeDefaultClose: true,
            defaultToolbar: [{
                layEvent: 'refresh',
                icon: 'layui-icon-refresh',
                title: '刷新'
            }, 'filter', 'print', 'exports'],
            cols: [
                [
                    {type: 'checkbox',hide: true},
                    {field: 'indexName', title: '指标名称', align: 'left', minWidth: 220},
                    {field: 'indexType', title: '指标类型',align: 'center',templet: "#index-type", minWidth: 90},
                    {field: 'dataCycle', title: '数据周期',align: 'center',templet: "#data-cycle", minWidth: 90},
                    {field: 'analRole', title: '分析角色',align: 'center',templet: "#anal-role", minWidth: 90},
                    {field: 'isQuery', title: '是否查询条件',align: 'center',templet: "#is-query", minWidth: 90},
                    {field: 'classifyName', title: '分类名称', align: 'center',minWidth: 150},
                    {field: 'tableName', title: '表名', align: 'left',minWidth: 220},
                    {field: 'columnName', title: '列名', align: 'left',minWidth: 150},
                    {field: 'tableExpr', title: '表达式', align: 'center',minWidth: 250},
                    {field: 'createTime', title: '创建时间',align: 'center',templet: "#create-time",width: 170},
                    {field: 'sortId', title: '排序ID', align: 'center',width: 80},
                    {field: 'realName', title: '创建人', align: 'center',width: 110},
                    {field: 'indexClass', title: '指标分类', align: 'center',width: 110,templet: "#index-class"},
                    {field: 'indexId', title: '指标ID', align: 'center',hide: true},
                    {title: '操作', templet: '#dept-bar', width: 120, align: 'center'}
                ]
            ]
        });

        form.on('submit(dept-query)', function (data) {
            treetable.search("#dept-table", data.field.indexName);
            return false;
        });

        table.on('tool(dept-table)', function (obj) {
            if (obj.event === 'remove') {
                window.remove(obj);
            } else if (obj.event === 'edit') {
                window.edit(obj);
            }
        })

        table.on('toolbar(dept-table)', function (obj) {
            if (obj.event === 'add') {
                window.add();
            } else if (obj.event === 'refresh') {
                window.refresh();
            }
        });

        form.on('switch(dept-enable)', function (obj) {
            let operate;
            if (obj.elem.checked) {
                operate = "enable";
            } else {
                operate = "disable";
            }
            let loading = layer.load();
            $.ajax({
                url: '/system/dept/' + operate,
                data: JSON.stringify({deptId: this.value}),
                dataType: 'json',
                contentType: 'application/json',
                type: 'put',
                success: function (result) {
                    layer.close(loading);
                    if (result.success) {
                        popup.success(result.msg);
                    } else {
                        popup.failure(result.msg);
                    }
                }
            })
        });

        window.add = function () {
            layer.open({
                type: 2,
                title: '新增',
                shade: 0.1,
                area: ['580px', '785px'],
                content: MODULE_PATH + 'toAdd'
            });
        }

        window.edit = function (obj) {
            layer.open({
                type: 2,
                title: '修改',
                shade: 0.1,
                area: ['580px', '785px'],
                content: MODULE_PATH + 'toEdit?indexId=' + obj.data['indexId']
            });
        }

        window.remove = function (obj) {
            layer.confirm('确定要删除该指标', {icon: 3, title: '提示'}, function (index) {
                layer.close(index);
                let loading = layer.load();
                $.ajax({
                    url: MODULE_PATH + "remove/" + obj.data['indexId'],
                    dataType: 'json',
                    type: 'delete',
                    success: function (result) {
                        layer.close(loading);
                        if (result.retCode =='0') {
                            popup.success(result.retMsg, function () {
                                obj.del();
                            });
                        } else {
                            popup.failure(result.retMsg);
                        }
                    }
                })
            });
        }

        window.refresh = function () {
            treetable.reload('#dept-table');
        }
    })
</script>
</html>
