<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('指标修改')"/>
</head>
<body>
<form action="" class="layui-form">
    <div class="mainBox">
        <div class="main-container">
            <div class="main-container">
                <input id="indexId" name="indexId" th:value="${reportIndex.indexId}" type="hidden"/>

                <div class="layui-form-item">
                    <label class="layui-form-label"><span style="color: red;">*</span>指标名称</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="indexName" placeholder="请输入指标名称"
                               type="text" th:value="${reportIndex.indexName}">
                    </div>
                </div>
                <!--<div class="layui-form-item">
                    <label class="layui-form-label">指标类型</label>
                    <div class="layui-input-block">
                        <input name="indexType" title="统计" type="radio" value="count" th:checked="${reportIndex.indexType eq 'count'}"/>
                        <input name="indexType" title="明细" type="radio" value="details" th:checked="${reportIndex.indexType eq 'details'}"/>
                    </div>
                </div>-->
                <!--<div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;"><span style="color:red;">*</span>所属分类</label>
                    <div class="layui-input-block">
                        <select name="classifyId" id="classifyId" lay-filter="classifyId" lay-verify="required">
                            <option th:each="reportClassify:${reportClassifys}" th:text="${reportClassify.classifyName}" th:value="${reportClassify.classifyId}"></option>
                        </select>
                    </div>
                    <input id="hidClassifyId" name="hidClassifyId" th:value="${reportIndex.classifyId}" type="hidden"/>
                </div>-->

                <div class="layui-form-item">
                    <label class="layui-form-label">指标类型</label>
                    <div class="layui-input-block" style="pointer-events: none;">
                        <input name="indexType" title="统计" type="radio" value="count" th:checked="${reportIndex.indexType eq 'count'}"/>
                        <input name="indexType" title="明细" type="radio" value="details" th:checked="${reportIndex.indexType eq 'details'}"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">数据周期</label>
                    <div class="layui-input-block" style="pointer-events: none;">
                        <input name="dataCycle" title="日" type="radio" value="day" th:checked="${reportIndex.dataCycle eq 'day'}"/>
                        <input name="dataCycle" title="月" type="radio" value="month" th:checked="${reportIndex.dataCycle eq 'month'}"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">分析角色</label>
                    <div class="layui-input-block" style="pointer-events: none;">
                        <input name="analRole" title="客户" type="radio" value="customer" th:checked="${reportIndex.analRole eq 'customer'}"/>
                        <input name="analRole" title="用户" type="radio" value="user" th:checked="${reportIndex.analRole eq 'user'}"/>
                        <input name="analRole" title="账户" type="radio" value="account" th:checked="${reportIndex.analRole eq 'account'}"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="width: 100px;">是否查询条件</label>
                    <div class="layui-input-block" style="pointer-events: none;">
                        <input checked name="isQuery" title="否" type="radio" value="0" />
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;margin-right: 15px;">包含非标准维度</label>
                    <div class="layui-input-block" style="pointer-events: none;">
                        <input name="isIncludeNoStand" title="不包含" type="radio" value="0" th:checked="${reportIndex.isIncludeNoStand eq '0'}"/>
                        <input name="isIncludeNoStand" title="包含" type="radio" value="1" th:checked="${reportIndex.isIncludeNoStand eq '1'}"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;margin-right: 15px;">统计大宽表</label>
                    <div class="layui-input-block" style="pointer-events: none;">
                        <input name="isFiveInten" title="不包含" type="radio" value="0" th:checked="${reportIndex.isFiveInten eq '0'}"/>
                        <input name="isFiveInten" title="包含" type="radio" value="1" th:checked="${reportIndex.isFiveInten eq '1'}"/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">表名</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" name="tableName" placeholder="请输入表名"
                               type="text" th:value="${reportIndex.tableName}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">列名</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" name="columnName" placeholder="请输入列名"
                               type="text" th:value="${reportIndex.columnName}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">表达式</label>
                    <div class="layui-input-block">
                        <textarea class="layui-textarea" name="tableExpr" id="tableExpr" th:text="${reportIndex.tableExpr}"></textarea>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">排序</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" name="sortId" id="sortId" placeholder="请输入排序"
                               type="number" th:value="${reportIndex.sortId}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">指标分类</label>
                    <div class="layui-input-block">
                        <select name="indexClass" id="indexClass" lay-filter="indexClass">
                            <option></option>
                            <option value="lv" th:selected="${reportIndex.indexClass eq 'lv'}">率</option>
                            <option value="tb" th:selected="${reportIndex.indexClass eq 'tb'}">同比</option>
                            <option value="hb" th:selected="${reportIndex.indexClass eq 'hb'}">环比</option>
                            <option value="zb" th:selected="${reportIndex.indexClass eq 'zb'}">占比</option>
                            <option value="hj" th:selected="${reportIndex.indexClass eq 'hj'}">户均</option>
                        </select>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">分子表达式</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" name="fzBds" id="fzBds" placeholder=""
                               type="text" th:value="${reportIndex.fzBds}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">分母表达式</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" name="fmBds" id="fmBds" placeholder=""
                               type="text" th:value="${reportIndex.fmBds}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">分子表达式2</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" name="fzBdsEr" id="fzBdsEr" placeholder=""
                               type="text" th:value="${reportIndex.fzBdsEr}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">分母表达式2</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" name="fmBdsEr" id="fmBdsEr" placeholder=""
                               type="text" th:value="${reportIndex.fmBdsEr}">
                    </div>
                </div>

            </div>
        </div>
    </div>
    <div class="bottom">
        <div class="button-container">
            <button class="pear-btn pear-btn-primary pear-btn-sm" lay-filter="dept-update" lay-submit=""
                    type="submit">
                <i class="layui-icon layui-icon-ok"></i>
                提交
            </button>
            <button class="pear-btn pear-btn-sm" type="reset">
                <i class="layui-icon layui-icon-refresh"></i>
                重置
            </button>
        </div>
    </div>
</form>
<th:block th:include="include :: footer"/>
<script>
    layui.use(['form', 'jquery'], function () {
        let form = layui.form;
        let $ = layui.jquery;

        /*var selClassifyId = $("#hidClassifyId").val();
        $("#classifyId").val(selClassifyId);
        form.render('select');*/




        form.on('submit(dept-update)', function (data) {

            $.ajax({
                url: '/autoData/indexManage/updateIndex',
                data: JSON.stringify(data.field),
                dataType: 'json',
                contentType: 'application/json',
                type: 'put',
                success: function (result) {
                    if (result.retCode =="0") {
                        layer.msg(result.retMsg, {icon: 1, time: 2000}, function () {
                            parent.layer.close(parent.layer.getFrameIndex(window.name));
                            parent.layui.table.reload("dict-data-table");
                        });
                    } else {
                        layer.msg(result.retMsg, {icon: 2, time: 2000});
                    }
                }
            })
            return false;
        });
    })
</script>
<script>
</script>
</body>
</html>
