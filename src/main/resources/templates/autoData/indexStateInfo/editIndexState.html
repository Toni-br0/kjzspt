<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('指标口径查询修改')"/>
</head>
<body>

<!--加载动画-->
<div class="loading" style="display: none" id="loadDiv">
    <span class="top"></span>
    <span class="bottom"></span>
</div>

<form class="layui-form">
    <div class="mainBox">
        <div class="main-container">
            <div class="main-container">
                <input autocomplete="off" class="layui-input" lay-verify="required" name="infoId" id="infoId" placeholder=""
                       type="hidden" th:value="${reportIndexStateInfo.infoId}">

                <div class="layui-form-item">
                    <label class="layui-form-label"><span style="color:red;">*</span>指标名称</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="indexName" id="indexName" placeholder=""
                               type="text" th:value="${reportIndexStateInfo.indexName}">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label"><span style="color:red;">*</span>指标字段</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="indexField" id="indexField" placeholder=""
                               type="text" th:value="${reportIndexStateInfo.indexField}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label"><span style="color:red;">*</span>所属分类</label>
                    <div class="layui-input-block">
                        <!--<select id="classifyId" name="classifyId" lay-verify="required" placeholder="所属分类">
                            <option th:each="classify:${classifys}" th:text="${classify.classifyName}" th:value="${classify.classifyId}" th:selected="${reportIndexStateInfo.classifyId == classify.classifyId}"></option>
                        </select>-->

                        <input autocomplete="off" class="layui-input" lay-verify="required" name="classifyName" id="classifyName" placeholder=""
                               type="text" th:value="${reportIndexStateInfo.classifyName}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;"><span style="color:red;">*</span>所属宽表</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="belongTable" id="belongTable" placeholder=""
                               type="text" th:value="${reportIndexStateInfo.belongTable}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;"><span style="color:red;">*</span>业务口径说明</label>
                    <div class="layui-input-block">
                        <!--<input autocomplete="off" class="layui-input" lay-verify="required" name="businessStatement" id="businessStatement" placeholder=""
                               type="text" th:value="${reportIndexStateInfo.businessStatement}">-->
                        <textarea id="businessStatement" name="businessStatement" placeholder="" class="layui-textarea" th:text="${reportIndexStateInfo.businessStatement}"></textarea>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;padding-left: 1px;"><span style="color:red;">*</span>业务口径负责人</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="businessCaliberLeader" id="businessCaliberLeader" placeholder=""
                               type="text"  th:value="${reportIndexStateInfo.businessCaliberLeader}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;"><span style="color:red;">*</span>数据口径</label>
                    <div class="layui-input-block">
                        <!--<input autocomplete="off" class="layui-input" lay-verify="required" name="dataCaliber" id="dataCaliber" placeholder=""
                               type="text" th:value="${reportIndexStateInfo.dataCaliber}">-->
                        <textarea id="dataCaliber" name="dataCaliber" placeholder="" class="layui-textarea" th:text="${reportIndexStateInfo.dataCaliber}"></textarea>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;"><span style="color:red;">*</span>涉及宽表</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="involvingTable" id="involvingTable" placeholder=""
                               type="text" th:value="${reportIndexStateInfo.involvingTable}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label" style="white-space: nowrap;padding-left: 1px;"><span style="color:red;">*</span>数据口径负责人</label>
                    <div class="layui-input-block">
                        <input autocomplete="off" class="layui-input" lay-verify="required" name="dataCaliberLeader" id="dataCaliberLeader" placeholder=""
                               type="text"  th:value="${reportIndexStateInfo.dataCaliberLeader}">
                    </div>
                </div>

                <div class="layui-form-item" style="margin-top:50px; display: flex; justify-content: center; align-items: center;">

                    <!--<button id="btnSubmit" class="pear-btn pear-btn-primary pear-btn-sm" lay-filter="user-save" lay-submit="" type="submit">
                        &lt;!&ndash;<i class="layui-icon layui-icon-ok"></i>&ndash;&gt;
                        <i class="layui-icon layui-icon-refresh"></i>
                        提交
                    </button>-->

                    <button id="btnSubmit" class="pear-btn pear-btn-sm" lay-filter="user-save" lay-submit="" type="submit">
                        <!--<i class="layui-icon layui-icon-ok"></i>-->
                        <i class="layui-icon layui-icon-ok"></i>
                        提交
                    </button>

                    &nbsp;&nbsp;
                    <button id="btnReset" class="pear-btn pear-btn-sm" type="reset">
                        <i class="layui-icon layui-icon-refresh"></i>
                        重置
                    </button>
                </div>

            </div>
        </div>
    </div>
    <!--<div class="bottom">
        <div class="button-container" >
            <button class="pear-btn pear-btn-primary pear-btn-sm" lay-filter="user-save" lay-submit="" type="submit">
                <i class="layui-icon layui-icon-ok"></i>
                提交
            </button>
            <button class="pear-btn pear-btn-sm" type="reset">
                <i class="layui-icon layui-icon-refresh"></i>
                重置
            </button>
        </div>
    </div>-->
</form>
<th:block th:include="include :: footer"/>
<script>

    layui.use(['form', 'jquery', 'dtree'], function () {

        let form = layui.form;
        let $ = layui.jquery;
        let dtree = layui.dtree;
        var layer = layui.layer;

        //保存提交事件
        form.on('submit(user-save)', function (data) {

            var param = JSON.stringify(data.field);

            //data.field.modelId = data.field.select;
            console.log("param: "+param);

            $("#loadDiv").show();
            $("#btnSubmit").prop("disabled", true);
            $("#btnReset").prop("disabled", true);

            $.ajax({
                url: '/autoData/indexStateInfo/updateIndexStateInfo',
                data: param,
                dataType: 'json',
                contentType: 'application/json',
                type: 'post',
                success: function (result) {

                    $("#loadDiv").hide();
                    $("#btnSubmit").prop("disabled", false);
                    $("#btnReset").prop("disabled", false);
                    console.log("result: "+JSON.stringify(result));
                    if (result.retCode == "0") {
                        layer.msg(result.retMsg, {icon: 1, time: 2000}, function () {
                            parent.layer.close(parent.layer.getFrameIndex(window.name));//关闭当前页
                            parent.layui.table.reload("file-table");
                        });
                    } else {
                        layer.msg(result.retMsg, {icon: 2, time: 2000});
                    }
                }
            })
            return false;
        });


    })



</script>
<script>
</script>
</body>
</html>
