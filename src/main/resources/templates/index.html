<script th:inline="javascript">
    layui.use(['admin', 'jquery', 'layer', 'popup'], function () {
        let admin = layui.admin;
        let $ = layui.jquery;
        let layer = layui.layer;
        let popup = layui.popup;


        // 框架初始化时会读取 根目录下 pear.config.yml 文件配置
        // 你可以通过 admin.setConfigPath 方法修改配置文件位置
        // 你可以通过 admin.setConfigType 方法修改配置文件类型
        admin.setConfigType("yml");
        admin.setConfigPath("pear.config.yml");
        admin.render();

        // 登录注销
        admin.logout(function () {
            let loading = layer.load();
            $.ajax({
                url: '/logout',
                dataType: 'json',
                async: false,
                type: 'post',
                success: (result) => {
                    layer.close(loading);
                    if (result.success) {
                        popup.success(result.msg, function () {
                            //location.href = "/";
                            location.href = "/login";
                        });
                    }
                }
            })
            return true;
        });

        // ========== 极度流畅拖拽逻辑（拖拽时隐藏提示，无额外重绘） ==========
        setTimeout(() => {
            const icon = document.getElementById('aiIcon');
            const tooltip = document.getElementById('aiTooltip');
            if (!icon) return;

            let isDragging = false;
            let hasMoved = false;
            let startMouseX = 0, startMouseY = 0;
            let offsetX = 0, offsetY = 0;          // 鼠标相对于图标左上角偏移
            let targetLeft = 0, targetTop = 0;      // 待更新的目标位置
            let rafId = null;                       // requestAnimationFrame ID
            let tooltipVisible = false;              // 记录拖拽前提示是否可见（用于拖拽结束后恢复）
            const moveThreshold = 5;

            // 应用位置（仅更新图标）
            function applyPosition(left, top) {
                icon.style.transform = `translate(${left}px, ${top}px)`;
            }

            // 动画帧执行更新
            function updatePosition() {
                if (!isDragging) return;
                applyPosition(targetLeft, targetTop);
                rafId = null;
            }

            // 请求更新（节流）
            function requestUpdate(left, top) {
                targetLeft = left;
                targetTop = top;
                if (rafId === null) {
                    rafId = requestAnimationFrame(updatePosition);
                }
            }

            icon.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                e.preventDefault();

                // 记录拖拽前提示框是否可见，然后强制隐藏提示框（避免拖拽中更新）
                tooltipVisible = (tooltip.style.opacity === '1');
                if (tooltipVisible) {
                    tooltip.style.opacity = '0';
                }

                const rect = icon.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                startMouseX = e.clientX;
                startMouseY = e.clientY;
                isDragging = true;
                hasMoved = false;
                icon.style.cursor = 'grabbing';
                icon.style.transition = 'none';

                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            });

            function onMouseMove(e) {
                if (!isDragging) return;

                const dx = e.clientX - startMouseX;
                const dy = e.clientY - startMouseY;

                if (!hasMoved && (Math.abs(dx) > moveThreshold || Math.abs(dy) > moveThreshold)) {
                    hasMoved = true;
                }

                // 新位置 = 鼠标当前位置 - 偏移量
                let newLeft = e.clientX - offsetX;
                let newTop = e.clientY - offsetY;

                // 边界限制（避免拖出视口）
                const maxLeft = window.innerWidth - icon.offsetWidth;
                const maxTop = window.innerHeight - icon.offsetHeight;
                newLeft = Math.min(Math.max(newLeft, 0), maxLeft);
                newTop = Math.min(Math.max(newTop, 0), maxTop);

                requestUpdate(newLeft, newTop);
            }

            function onMouseUp(e) {
                if (isDragging) {
                    if (rafId) {
                        cancelAnimationFrame(rafId);
                        rafId = null;
                    }
                    icon.style.transition = '';
                    if (!hasMoved) {
                        // 点击跳转
                        parent.layui.admin.addTab("2030862259198099457", "智能问数", "/znws/toZnws");
                    }
                    isDragging = false;
                    icon.style.cursor = 'grab';
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);

                    // 恢复提示框显示（如果拖拽前是可见的，且鼠标仍在图标上）
                    if (tooltipVisible) {
                        // 延迟一点，避免立即触发mouseenter导致闪烁
                        setTimeout(() => {
                            // 检查鼠标是否在图标范围内
                            const rect = icon.getBoundingClientRect();
                            const isMouseOver = e.clientX >= rect.left && e.clientX <= rect.right &&
                                e.clientY >= rect.top && e.clientY <= rect.bottom;
                            if (isMouseOver) {
                                // 手动触发展示
                                tooltip.style.left = (rect.right + 15) + 'px';
                                tooltip.style.top = (rect.top + rect.height / 2) + 'px';
                                tooltip.style.opacity = '1';
                            } else {
                                // 鼠标不在图标上，保持隐藏，等待下次进入
                                tooltip.style.opacity = '0';
                            }
                        }, 10);
                    }
                }
            }

            // 初始光标
            icon.style.cursor = 'grab';

            // 悬停提示（正常逻辑）
            icon.addEventListener('mouseenter', () => {
                // 如果正在拖拽，不显示提示（已在mousedown中强制隐藏）
                if (isDragging) return;
                const rect = icon.getBoundingClientRect();
                tooltip.style.left = (rect.right + 15) + 'px';
                tooltip.style.top = (rect.top + rect.height / 2) + 'px';
                tooltip.style.opacity = '1';
            });

            icon.addEventListener('mouseleave', () => {
                // 拖拽时不处理，避免干扰
                if (isDragging) return;
                tooltip.style.opacity = '0';
            });

        }, 100);
    });

    // ========== 原有的日期和用户名功能保持不变 ==========
    /**
     * 获取年月日星期
     * @returns {string}
     */
    function getDate(){
      //获取日期
      var now = new Date();
      var year = now.getFullYear();//获取当前年份
      var month = now.getMonth()+1;//当前月份
      if(month<10)
          month = "0" + month;
      else{
          month = month;
      }

      var day = now.getDate();//当前天份
      if(day<10)
          day = "0" + day;
      else{
          day = day;
      }


      //获取星期
      const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
      var weekDay =days[now.getDay()];

      var retDataTime = year+"年"+month+"月"+day+"日"+"&nbsp;&nbsp;"+weekDay;

      //$('#dataDiv').text(dataTime+" "+weekDay);
      return retDataTime;
  }


    /**
     * 获取时分秒
     * @returns {string}
     */
    function getTime(){
      //获取日期
      var now = new Date();
      var time=now.getHours();//当前小时
      if(time <10){
          time = "0"+time;
      }

      var minutes=now.getMinutes();//当前分钟
      if(minutes <10){
          minutes = "0"+minutes;
      }

      var seconds=now.getSeconds();//当前秒钟
      if(seconds <10){
          seconds = "0"+seconds;
      }
      var retTime="&nbsp;&nbsp;"+time+":"+minutes+":"+seconds; //获取当前时分秒
      return retTime;
  }



   var retDate = getDate();


    setInterval(() => {
        $('#dataDiv').html(retDate+getTime());
    }, 1000);

    //获取用户名
    $.ajax({
        url: "/system/user/getUserName",
        dataType: 'json',
        contentType: 'application/json',
        type: 'post',
        success: function (result) {
            if (result.retCode == "0") {
                //alert(result.retMsg);
                $('#userNameDiv').html("欢迎您："+result.realName+"&nbsp;&nbsp;&nbsp;&nbsp;");
            } else {

            }
        }
    })
    // ==========================================
    // 全局客服悬浮窗 (垂直物理拖拽交互实现)
    // ==========================================
    document.addEventListener('DOMContentLoaded', function() {
        const widget = document.getElementById('globalDraggableWidget');
        const trigger = widget.querySelector('.cs-trigger');
        const card = widget.querySelector('.cs-card');

        if (!widget || !trigger) return;

        let isDragging = false;
        let startY = 0;
        let initialBottom = 0;

        trigger.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;

            isDragging = true;

            startY = e.clientY;

            const style = window.getComputedStyle(widget);
            initialBottom = parseInt(style.bottom) || 0;

            widget.classList.add('cs-dragging');

            card.style.opacity = '0';
            card.style.visibility = 'hidden';

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);

            e.preventDefault();
        });

        const onMouseMove = function(e) {
            if (!isDragging) return;


            const deltaY = e.clientY - startY;
            let newBottom = initialBottom - deltaY;

            const windowHeight = window.innerHeight;
            const widgetHeight = widget.offsetHeight;

            const maxBottom = windowHeight - widgetHeight - 20;
            const minBottom = 20;

            newBottom = Math.max(minBottom, Math.min(newBottom, maxBottom));

            widget.style.bottom = newBottom + 'px';
        };

        const onMouseUp = function(e) {
            if (!isDragging) return;

            isDragging = false;

            widget.classList.remove('cs-dragging');
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);

            card.style.opacity = '';
            card.style.visibility = '';
        };
    });
</script>
